<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Menu</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <!-- Top Bar -->
    <div id="top-bar">
        <div id="settings-btn" class="icon"></div>
        <div id="profile-btn" class="icon"></div>
    </div>

    <!-- Menu Container -->
    <div id="menu-container">
        <div class="menu-card" data-action="singleplayer">Singleplayer</div>
        <div class="menu-card" data-action="multiplayer">Multiplayer</div>
        <div class="menu-card" data-action="credits">Credits</div>
    </div>

    <!-- JS -->
    <script type="module" src="main.js"></script>
</body>
</html>
