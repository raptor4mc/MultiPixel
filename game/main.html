<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Menu</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <!-- Top Bar -->
    <div id="top-bar">
        <div id="settings-btn" class="icon"></div>
        <div id="profile-btn" class="icon"></div>
    </div>

    <!-- Horizontal Menu -->
    <div id="menu-row">

        <!-- Left Small Square -->
        <div id="menu-left" class="menu-small"></div>

        <!-- Center Big Square -->
        <div id="menu-center" class="menu-big">
            <div id="menu-label">Singleplayer</div>
        </div>

        <!-- Right Small Square -->
        <div id="menu-right" class="menu-small"></div>

    </div>

    <!-- JS -->
    <script type="module" src="main.js"></script>
</body>
</html>
