<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Menu</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <!-- Top Bar -->
    <div id="top-bar">
        <div id="settings-btn" class="icon"></div>
        <div id="profile-btn" class="icon"></div>
    </div>

    <!-- Menu Wheel -->
    <div id="menu-wheel">
        <!-- Corner Squares -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <!-- Center Square -->
        <div id="menu-center">
            <div id="menu-label">Singleplayer</div>
        </div>
    </div>

    <!-- JS -->
    <script type="module" src="main.js"></script>
</body>
</html>
