<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiRaptor IDE (M.R.I.D.E.)</title>

    <!-- Tailwind (as you already used) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Core IDE styles -->
    <link rel="stylesheet" href="./coding.css" />

    <!-- Themes -->
    <link rel="stylesheet" href="./themes/dark.css" id="theme-dark" />
    <link rel="stylesheet" href="./themes/light.css" id="theme-light" disabled />
    <link rel="stylesheet" href="./themes/neon.css" id="theme-neon" disabled />
  </head>

  <body class="p-4">
    <!-- Header / Title -->
    <div class="max-w-7xl mx-auto mb-4">
      <h1 class="text-3xl font-bold text-white tracking-wider">
        MultiRaptor IDE (<span class="text-blue-400">M.R.I.D.E.</span>)
        <span class="text-xl text-gray-500">
          (v5.1 - AST Interpreter)
          <span
            id="info-icon"
            class="ml-2 inline-block cursor-pointer text-blue-400 hover:text-white transition duration-150 relative"
          >
            <!-- Info Icon SVG -->
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>

            <!-- Tooltip Container (content filled by TS) -->
            <div
              id="info-tooltip"
              class="absolute hidden p-2 bg-gray-800 text-white text-xs rounded shadow-lg z-10 border border-blue-500 whitespace-pre"
            ></div>
          </span>
        </span>
      </h1>
    </div>

    <!-- Action Dialog (Create file/folder) -->
    <div
      id="action-dialog"
      class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 p-6 rounded-lg shadow-2xl bg-gray-800 border border-blue-500 w-full max-w-sm"
    >
      <h3 id="dialog-title" class="text-xl font-bold text-white mb-4">
        Create New Item
      </h3>

      <p
        id="dialog-prompt"
        class="text-gray-300 mb-4 text-sm"
      ></p>

      <div
        id="dialog-path-display"
        class="text-xs text-gray-500 mb-2"
      ></div>

      <input
        type="text"
        id="dialog-input"
        class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white font-mono focus:outline-none focus:border-blue-400"
        placeholder="Enter name..."
      />

      <div class="mt-6 flex justify-end space-x-3">
        <button
          id="dialog-cancel-button"
          class="px-4 py-2 text-sm font-semibold rounded bg-gray-600 hover:bg-gray-700 text-white transition duration-150"
        >
          Cancel
        </button>
        <button
          id="dialog-submit-button"
          class="px-4 py-2 text-sm font-semibold rounded bg-blue-600 hover:bg-blue-700 text-white transition duration-150"
        >
          Create
        </button>
      </div>
    </div>

    <!-- Confirmation Dialog (Delete) -->
    <div
      id="confirm-dialog"
      class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 p-6 rounded-lg shadow-2xl bg-gray-800 border border-red-500 w-full max-w-sm"
    >
      <h3
        id="confirm-title"
        class="text-xl font-bold text-red-400 mb-4"
      >
        Confirm Action
      </h3>

      <p
        id="confirm-prompt"
        class="text-gray-300 mb-6 text-sm"
      >
        Are you sure you want to proceed?
      </p>

      <div class="mt-4 flex justify-end space-x-3">
        <button
          id="confirm-cancel-button"
          class="px-4 py-2 text-sm font-semibold rounded bg-gray-600 hover:bg-gray-700 text-white transition duration-150"
        >
          No, Cancel
        </button>
        <button
          id="confirm-accept-button"
          class="px-4 py-2 text-sm font-semibold rounded bg-red-600 hover:bg-red-700 text-white transition duration-150"
        >
          Yes, Delete
        </button>
      </div>
    </div>

    <!-- IDE Container -->
    <div
      id="ide-container"
      class="shadow-2xl max-w-7xl mx-auto rounded-lg overflow-hidden"
    >
      <!-- File Explorer Sidebar -->
      <div id="file-explorer" class="file-explorer">
        <div
          id="file-explorer-header"
          class="p-3 text-sm font-semibold text-gray-400 uppercase tracking-wider border-b border-[#3c3c3c] flex justify-between items-center"
        >
          <span id="file-explorer-header-text">PROJECT</span>
        </div>

        <div
          id="file-list"
          class="pt-2 flex-grow overflow-y-auto"
        ></div>

        <!-- Global File Management Actions -->
        <div
          id="file-management-actions"
          class="p-3 border-t border-[#3c3c3c] flex flex-col space-y-2"
        >
          <button
            id="new-file-button-root"
            class="w-full text-xs font-semibold text-white bg-green-600 hover:bg-green-700 p-2 rounded transition duration-150 flex items-center justify-center"
          >
            <svg
              class="w-4 h-4 mr-1"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              ></path>
            </svg>
            New File (Root)
          </button>

          <button
            id="new-folder-button-root"
            class="w-full text-xs font-semibold text-gray-800 bg-gray-300 hover:bg-gray-400 p-2 rounded transition duration-150 flex items-center justify-center"
          >
            <svg
              class="w-4 h-4 mr-1"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
              ></path>
            </svg>
            New Folder (Root)
          </button>
        </div>
      </div>

      <!-- Main Content: Editor + Console -->
      <div class="main-content">
        <!-- Editor Container -->
        <div id="editor-container" class="editor-container">
          <div
            id="editor-header"
            class="flex justify-between items-center bg-[#252526] p-2 border-b border-[#3c3c3c]"
          >
            <span
              id="current-file-name"
              class="text-white text-sm font-medium ml-2 px-2 py-1 bg-[#1e1e1e] rounded-t-md border-t border-l border-r border-[#3c3c3c]"
            >
              main.mr
            </span>

            <button
              id="run-button"
              class="run-button-accent text-white text-xs font-bold py-1.5 px-4 rounded transition duration-150 ease-in-out"
            >
              <svg
                class="w-4 h-4 inline mr-1 -mt-0.5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 12.016v3.31a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"
                ></path>
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
              Run Code
            </button>
          </div>

          <textarea
            id="code-input"
            class="code-editor"
            spellcheck="false"
          ></textarea>
        </div>

        <!-- Resizer -->
        <div id="resizer-bar" class="resizer-bar"></div>

        <!-- Console Panel -->
        <div id="console-panel" class="console-panel">
          <div
            class="flex flex-shrink-0 bg-[#1e1e1e] border-b border-[#3c3c3c]"
          >
            <button
              id="tab-terminal"
              class="tab-button active"
            >
              Terminal
            </button>
            <button
              id="tab-console"
              class="tab-button"
            >
              Program Output
            </button>
            <div class="flex-grow bg-[#1e1e1e]"></div>
          </div>

          <div
            id="terminal-pane"
            class="console-tab-content p-4 text-gray-300"
            style="display: block"
          >
            <div id="terminal-output"></div>
          </div>

          <div
            id="console-pane"
            class="console-tab-content p-4"
            style="display: none"
          >
            <div id="console-output"></div>
          </div>

          <div id="cli-input-wrapper" class="cli-input-wrapper">
            <span
              class="text-blue-400 mr-2 font-mono leading-none flex-shrink-0"
            >
              $ rap &gt;
            </span>
            <input
              type="text"
              id="cli-input"
              placeholder="Type 'rap help' or 'rap run'..."
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Compiled bundle (from coding.ts + modules) -->
    <script src="./coding.js" type="module"></script>
  </body>
</html>
