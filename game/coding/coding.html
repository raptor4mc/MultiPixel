<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiRaptor IDE</title>
    <link rel="stylesheet" href="coding.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.css">
</head>
<body>
    <div id="header">
        <h1>MultiRaptor IDE</h1>
        <div>
            <button id="new-repo">New Repo</button>
            <button id="save">Commit</button>
        </div>
    </div>
    <div id="main">
        <div id="sidebar">
            <h3>Repos</h3>
            <div id="repos-list"></div>
            <h3>Files</h3>
            <div id="files-list"></div>
        </div>
        <div id="editor-container">
            <div id="editor"></div>
        </div>
    </div>
    <!-- Include terminal component -->
    <div id="terminal-container">
        <iframe src="terminal/terminal.html" width="100%" height="200" frameborder="0"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="coding.js"></script>
</body>
</html>
