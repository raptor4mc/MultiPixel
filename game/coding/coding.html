<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiRaptor IDE</title>
    <link rel="stylesheet" href="coding.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.css">
    <!-- New script links for organization and features -->
    <script src="utils/storage.js"></script>
    <script src="utils/helpers.js"></script>
    <script src="language/multiraptor.js"></script>
    <script src="language/extensions/loops.js"></script>
    <script src="language/extensions/functions.js"></script>
    <script src="components/editor.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="features/repos.js"></script>
    <script src="features/files.js"></script>
    <script src="features/settings.js"></script>
    <script src="main.js"></script>
</head>
<body>
    <div id="header">
        <h1>MultiRaptor IDE</h1>
        <div>
            <button id="new-repo">New Repo</button>
            <button id="save">Commit</button>
            <!-- New buttons for advanced features -->
            <button id="new-branch">New Branch</button>
            <button id="new-issue">New Issue</button>
            <button id="settings">Settings</button>
        </div>
    </div>
    <div id="main">
        <div id="sidebar">
            <h3>Repos</h3>
            <div id="repos-list"></div>
            <h3>Files</h3>
            <div id="files-list"></div>
            <!-- New elements for file management -->
            <input id="search-files" placeholder="Search files...">
            <button id="new-file">New File</button>
            <button id="new-folder">New Folder</button>
        </div>
        <div id="editor-container">
            <div id="editor"></div>
        </div>
    </div>
    <!-- Terminal component via iframe -->
    <div id="terminal-container">
        <iframe src="terminal/terminal.html" width="100%" height="200" frameborder="0"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="coding.js"></script>
</body>
</html>
