<!DOCTYPE html>
<html>
<head>
    <title>MultiRaptor | Game Engine</title>
    <link rel="stylesheet" href="coding.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="workbench">
        <div class="activity-bar">
            <i class="fas fa-code active"></i>
            <i class="fas fa-ghost"></i> <i class="fas fa-cog" onclick="toggleSettings()"></i>
        </div>

        <div class="sidebar">
            <div class="section-title">PROJECT</div>
            <div class="file active"><i class="fas fa-dragon"></i> game.mr</div>
        </div>

        <div class="center-zone">
            <div class="tabs">
                <div class="tab active">game.mr</div>
                <div class="actions">
                    <button onclick="runCode()" class="btn-run"><i class="fas fa-play"></i> RUN</button>
                </div>
            </div>
            <textarea id="editor" spellcheck="false" oninput="saveLocal()"></textarea>
            
            <div class="terminal">
                <div class="terminal-header">TERMINAL <span onclick="clearTerminal()">Clear</span></div>
                <div id="output"></div>
            </div>
        </div>

        <div class="stage-zone">
            <div class="stage-header">GAME VIEW</div>
            <div id="game-canvas">
                <div id="player" class="hidden">🐉</div>
            </div>
            <div class="inspector">
                <div class="section-title">VARIABLES</div>
                <div id="var-monitor"></div>
            </div>
        </div>
    </div>

    <div id="settings-menu" class="hidden">
        <h3>ENGINE SETTINGS</h3>
        <label><input type="checkbox" id="safety-toggle" checked onchange="updateSettings()"> Safety Mode</label>
        <label><input type="checkbox" id="semi-toggle" checked onchange="updateSettings()"> Semicolons</label>
    </div>

    <script src="coding.js"></script>
</body>
</html>
