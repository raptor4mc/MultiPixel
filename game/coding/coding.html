<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiPixel | Repository</title>
    <link rel="stylesheet" href="coding.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="repo-info"><i class="fas fa-code-branch"></i> main <span>MultiPixel / GameEngine</span></div>
            <div class="nav-actions"><button class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> Run</button></div>
        </header>

        <div class="main-split">
            <nav class="activity-bar">
                <i class="fas fa-file active"></i>
                <i class="fas fa-search"></i>
                <i class="fas fa-project-diagram"></i>
                <div class="spacer"></div>
                <i class="fas fa-cog"></i>
            </nav>

            <aside class="explorer">
                <div class="section-label">FILES</div>
                <div class="file active"><i class="fab fa-js text-yellow"></i> game.mr</div>
                <div class="file"><i class="fab fa-css3 text-blue"></i> style.css</div>
            </aside>

            <section class="editor-column">
                <div class="editor-tabs"><div class="tab active">game.mr</div></div>
                <textarea id="editor" spellcheck="false" oninput="saveLocal()"></textarea>
                
                <div class="bottom-dock">
                    <div class="dock-header">
                        <span class="dock-tab" onclick="switchDock('problems')">PROBLEMS</span>
                        <span class="dock-tab" onclick="switchDock('output-log')">OUTPUT</span>
                        <span class="dock-tab active" onclick="switchDock('terminal')">TERMINAL</span>
                    </div>
                    <div id="dock-content">
                        <div id="dock-problems" class="dock-panel hidden">No problems detected in workspace.</div>
                        <div id="dock-output-log" class="dock-panel hidden">Engine output initialized...</div>
                        <div id="dock-terminal" class="dock-panel">
                            <span class="prompt">~/multi-pixel</span> <span class="branch">main</span><br>
                            <div id="terminal-body"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="visualizer-column">
                <div class="viz-header">LIVE PREVIEW</div>
                <div class="stage">
                    <canvas id="gameCanvas" width="400" height="500"></canvas>
                    <div id="game-ui-overlay"></div>
                </div>
                <div class="inspector">
                    <div class="section-label">ENGINE VARIABLES</div>
                    <div id="memory-view"></div>
                </div>
            </section>
        </div>
    </div>
    <script src="coding.js"></script>
</body>
</html>
