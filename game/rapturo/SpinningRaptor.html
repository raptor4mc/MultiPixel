<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Raptor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000000; /* Solid black background */
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Extremely Minimal Timer UI per Screenshots */
        .timer-overlay {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .main-bubble {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 100px; /* Pill shape */
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bubble-header {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 700;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-right: 8px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .unit-group {
            display: flex;
            align-items: baseline;
            gap: 2px;
            animation: plop 0.3s ease-out;
        }

        @keyframes plop {
            0% { transform: translateY(-5px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .label {
            font-weight: 500;
            font-size: 0.6rem;
            color: #64748b;
        }

        .value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            color: #4ade80;
        }

        .raptor-count-badge {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            color: #86efac;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="timer-overlay">
        <div class="main-bubble" id="timerContent">
            <div class="bubble-header">Raptor Time</div>
            <div class="time-row" id="timeRow">
                <!-- Time units injected here -->
            </div>
        </div>
    </div>

    <div id="raptorBadge" class="raptor-count-badge">Raptors: 1</div>

    <script>
        let scene, camera, renderer, masterGroup;
        let startTime = Date.now();
        const timeRow = document.getElementById('timeRow');
        const badgeDisplay = document.getElementById('raptorBadge');
        
        let raptorCount = 1;
        const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

        function createRaptorMesh() {
            const group = new THREE.Group();
            const greenMat = new THREE.MeshPhongMaterial({ color: 0x22c55e, flatShading: true });
            const darkGreenMat = new THREE.MeshPhongMaterial({ color: 0x166534, flatShading: true });
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xfacc15 });

            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 1.6), greenMat);
            group.add(body);

            // Neck/Head
            const neck = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), greenMat);
            neck.position.set(0, 0.6, 0.6);
            neck.rotation.x = -0.5;
            group.add(neck);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.35, 0.8), greenMat);
            head.position.set(0, 1.1, 0.9);
            group.add(head);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(0.18, 1.2, 1.1);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(-0.18, 1.2, 1.1);
            group.add(eyeR);

            // Tail
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 2.0), darkGreenMat);
            tail.position.set(0, -0.1, -1.6);
            tail.rotation.x = -0.1;
            group.add(tail);

            // Legs
            const legGeo = new THREE.BoxGeometry(0.2, 0.8, 0.25);
            const legL = new THREE.Mesh(legGeo, darkGreenMat);
            legL.position.set(0.3, -0.6, 0);
            group.add(legL);

            const legR = new THREE.Mesh(legGeo, darkGreenMat);
            legR.position.set(-0.3, -0.6, 0);
            group.add(legR);

            return group;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 10, 7.5);
            scene.add(light);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            addRaptor(0);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function addRaptor(index) {
            const raptor = createRaptorMesh();
            raptor.position.x = index * 2.8; 
            masterGroup.add(raptor);
            
            const box = new THREE.Box3().setFromObject(masterGroup);
            const center = box.getCenter(new THREE.Vector3());
            masterGroup.children.forEach(child => child.position.sub(center));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            const elapsed = now - startTime;

            const targetCount = 1 + Math.floor(elapsed / SEVEN_DAYS_MS);
            if (raptorCount < targetCount) {
                addRaptor(raptorCount);
                raptorCount = targetCount;
                badgeDisplay.textContent = `Pack Size: ${raptorCount}`;
                camera.position.z = 6 + (raptorCount * 1.2);
            }

            // MODIFIED: Increased rotation speed from 0.045 to 0.12
            masterGroup.rotation.y += 0.12;
            masterGroup.rotation.x = Math.sin(now * 0.002) * 0.15; // Slightly more wobbling too

            updateTimerUI(elapsed);
            renderer.render(scene, camera);
        }

        function updateTimerUI(ms) {
            const totalS = Math.floor(ms / 1000);
            const d = Math.floor(totalS / 86400);
            const h = Math.floor((totalS % 86400) / 3600);
            const m = Math.floor((totalS % 3600) / 60);
            const s = totalS % 60;

            let html = '';
            if (d > 0) html += `<div class="unit-group"><span class="value">${d}</span><span class="label">d</span></div>`;
            if (h > 0 || d > 0) html += `<div class="unit-group"><span class="value">${h}</span><span class="label">h</span></div>`;
            if (m > 0 || h > 0 || d > 0) html += `<div class="unit-group"><span class="value">${m}</span><span class="label">m</span></div>`;
            html += `<div class="unit-group"><span class="value">${s}</span><span class="label">s</span></div>`;
            
            if (timeRow.dataset.lastTime !== totalS.toString()) {
                timeRow.innerHTML = html;
                timeRow.dataset.lastTime = totalS.toString();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
