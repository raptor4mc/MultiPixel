<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Raptor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crete+Round:wght@400;700&display=swap');
        body {
            font-family: 'Crete Round', serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f0fdf4; /* Emerald 50 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        #game-container {
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            overflow: hidden;
            background-color: #1e293b; /* Slate 800 */
        }
        #gameCanvas {
            display: block;
            width: 100%;
            background-color: #79ac78; /* A nice jungle green */
            border-bottom: 6px solid #3c6255; /* Reduced border size */
            cursor: pointer;
        }
        .ui-panel {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #334155;
        }
        
        .game-title {
            text-align: center;
            padding: 0.5rem 1rem;
            font-size: 2.5rem;
            height: 3.5rem; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden; 
        }

        /* Styling for the final, permanent letters (FLAPPY RAPTOR) */
        .game-title .letter {
            color: #fde047; /* Yellow 400 */
            position: absolute;
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.5s ease-out; /* Bounce transition */
        }

        /* Styling for the temporary initial letters (ReLimintor) */
        .game-title .temp-letter {
            color: #d1d5db; /* Gray 300 */
            position: absolute;
            opacity: 0;
            transition: transform 0.4s ease-in, opacity 0.4s ease-in; 
        }

        /* Neon Glow effect applied via JS after animation completes */
        .game-title.glow .letter {
            animation: neon-glow 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes neon-glow {
            from {
                text-shadow: 
                    0 0 5px #fde047, /* Yellow base */
                    0 0 10px #fde047,
                    0 0 15px #f97316; /* Orange glow */
            }
            to {
                text-shadow: 
                    0 0 3px #fde047,
                    0 0 10px #fde047,
                    0 0 20px #f97316,
                    0 0 35px #f97316; /* Stronger glow */
            }
        }

        .start-message, .game-over-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 1.5rem 2.5rem;
            background-color: rgba(0, 0, 0, 0.85);
            border-radius: 1rem;
            text-align: center;
            z-index: 10;
            border: 4px solid #fde047;
            box-shadow: 0 0 20px #fde047;
            max-width: 90%;
        }
        .start-message h2, .game-over-message h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #fde047;
        }
        .start-message p, .game-over-message p {
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }
        .raptor-info {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 1rem;
            display: none;
        }
        .score-box {
            background-color: #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="gameTitle" class="game-title"></div>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel">
        <div class="score-box">
            <div class="text-xs uppercase text-gray-400">Score</div>
            <div id="currentScore" class="text-2xl font-bold">0</div>
        </div>
        <div class="score-box">
            <div class="text-xs uppercase text-gray-400">High Score</div>
            <div id="highScore" class="text-2xl font-bold">0</div>
        </div>
    </div>
</div>

<div id="messageOverlay" class="start-message hidden">
    <h2 id="messageTitle">FLAPPY RAPTOR</h2>
    <p id="messageText">Click, tap, or press **SPACE** to jump and start!</p>
    <p class="raptor-info">Track your score against players globally!</p>
</div>

<script type="module">
    // --- FIREBASE INITIALIZATION AND AUTH ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    setLogLevel('error'); // Set to 'debug' for detailed logging

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
    const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    let app;
    let db;
    let auth;
    let userId = 'loading';
    let isAuthReady = false;

    if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        
        // Sign in logic
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Initial sign-in attempt
                try {
                    if (initialAuthToken) {
                        await signInWithCustomToken(auth, initialAuthToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Firebase Sign-In Failed:", error);
                }
            } else {
                userId = user.uid;
                isAuthReady = true;
                console.log("Authenticated as:", userId);
                setupHighscoreListener();
            }
        });
    } else {
        console.error("Firebase configuration not found. High score will not be saved.");
        isAuthReady = true;
    }

    const HIGHSCORE_COLLECTION = `artifacts/${appId}/public/data/flappy_raptor_highscore`;
    let currentHighScore = 0;

    function setupHighscoreListener() {
        if (!db || !isAuthReady) return;

        const scoreRef = doc(db, HIGHSCORE_COLLECTION, "global_high_score");

        // Listen for real-time updates to the global high score
        onSnapshot(scoreRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentHighScore = data.score || 0;
                document.getElementById('highScore').textContent = currentHighScore;
                console.log("High Score Updated:", currentHighScore);
            } else {
                currentHighScore = 0;
                document.getElementById('highScore').textContent = 0;
            }
        }, (error) => {
            console.error("Error listening to high score:", error);
        });
    }

    async function updateHighScore(newScore) {
        if (!db || !isAuthReady || newScore <= currentHighScore) return;

        const scoreRef = doc(db, HIGHSCORE_COLLECTION, "global_high_score");

        try {
            await runTransaction(db, async (transaction) => {
                const docSnap = await transaction.get(scoreRef);
                let currentBest = 0;

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentBest = data.score || 0;
                }

                if (newScore > currentBest) {
                    transaction.set(scoreRef, {
                        score: newScore,
                        userId: userId,
                        timestamp: Date.now()
                    });
                    currentHighScore = newScore;
                    console.log("New High Score Saved:", newScore);
                }
            });
        } catch (e) {
            console.error("Transaction failed: ", e);
        }
    }

    // --- TITLE ANIMATION LOGIC ---
    const FINAL_TITLE_TEXT = "FLAPPY RAPTOR";
    const INITIAL_TITLE_TEXT = "ReLimintor";
    const titleContainer = document.getElementById('gameTitle');

    function setupTitleAnimation() {
        titleContainer.innerHTML = '';
        titleContainer.classList.remove('glow');

        // --- 1. Setup Final Letter Spans (FLAPPY RAPTOR) ---
        const finalLetters = FINAL_TITLE_TEXT.split('').map(char => {
            const span = document.createElement('span');
            span.className = 'letter';
            span.textContent = char === ' ' ? '\u00A0' : char; 
            titleContainer.appendChild(span);
            return span;
        });

        // Temporarily set position to get required final metrics
        titleContainer.style.position = 'static';
        finalLetters.forEach(span => { span.style.position = 'static'; span.style.opacity = 1; });

        // Introduce a small vertical adjustment to fine-tune the visual center of the text block.
        const VERTICAL_ADJUSTMENT = -3; 
        
        // Calculate final positions (Used as anchors)
        const finalPositions = finalLetters.map(span => ({
            x: span.offsetLeft,
            y: span.offsetTop + VERTICAL_ADJUSTMENT // Apply vertical adjustment
        }));

        // Reset for animation: Clear and set absolute positioning
        titleContainer.style.position = 'relative';
        finalLetters.forEach(span => { span.style.position = 'absolute'; span.style.opacity = 0; span.style.transition = 'none'; });
        titleContainer.innerHTML = '';
        finalLetters.forEach(span => titleContainer.appendChild(span));
        
        const L_ANCHOR_INDEX = 1; // L in FLAPPY
        const R_ANCHOR_INDEX = 7; // R in RAPTOR
        const anchorLPos = finalPositions[L_ANCHOR_INDEX];
        const anchorRPos = finalPositions[R_ANCHOR_INDEX];

        // Set final absolute positions for FLAPPY RAPTOR letters
        finalLetters.forEach((span, index) => {
            const finalPos = finalPositions[index];
            span.style.left = `${finalPos.x}px`;
            span.style.top = `${finalPos.y}px`;
        });
        
        // --- 2. Setup Temporary Letter Spans (ReLimintor) ---
        const tempLetters = INITIAL_TITLE_TEXT.split('').map((char, index) => {
            const span = document.createElement('span');
            span.className = 'temp-letter';
            span.textContent = char;
            titleContainer.appendChild(span);
            
            // Map 10 letters of ReLimintor roughly across the 13 positions
            const mapIndex = [0, 2, 4, 5, 6, 8, 9, 10, 11, 12][index];
            const initialPos = finalPositions[mapIndex] || finalPositions[0]; // Fallback position
            
            span.style.left = `${initialPos.x}px`;
            span.style.top = `${initialPos.y}px`;
            span.style.transform = 'translate(0, 0)';
            
            // Store the initial position data on the span element itself for later calculation
            span._initialX = initialPos.x;
            span._initialY = initialPos.y;

            return span;
        });

        // --- 3. Animation Sequence ---

        let delay = 0;

        // PHASE 1: Initial Text Appearance (100ms)
        setTimeout(() => {
            tempLetters.forEach(span => span.style.opacity = 1);
        }, delay);
        delay += 500; // Hold time

        // PHASE 2: Disintegration (Letters fly to Anchors) (500ms)
        const breakdownLetters = [
            { index: 0, target: anchorLPos }, // R -> L
            { index: 1, target: anchorLPos }, // e -> L
            // L (index 2) and R (index 9) of temp text disappear
            { index: 3, target: anchorRPos }, // i -> R
            { index: 4, target: anchorRPos }, // m -> R
            { index: 5, target: anchorRPos }, // i -> R
            { index: 6, target: anchorRPos }, // n -> R
            { index: 7, target: anchorRPos }, // t -> R
            { index: 8, target: anchorRPos }, // o -> R
        ];

        breakdownLetters.forEach(({ index, target }) => {
            setTimeout(() => {
                const tempSpan = tempLetters[index];
                
                // Calculate movement needed: Target final position - current initial position
                const dx = target.x - tempSpan._initialX;
                const dy = target.y - tempSpan._initialY; 
                
                tempSpan.style.transform = `translate(${dx}px, ${dy}px)`;
                tempSpan.style.opacity = 0; // Fade out as they reach the anchor
            }, delay + Math.random() * 200);
        });

        // Hide original anchors and show final anchors
        setTimeout(() => {
            tempLetters[2].style.opacity = 0; // Temp L
            tempLetters[9].style.opacity = 0; // Temp R
            
            finalLetters[L_ANCHOR_INDEX].style.opacity = 1; // Final L
            finalLetters[R_ANCHOR_INDEX].style.opacity = 1; // Final R

            // Cleanup temp letters
            tempLetters.forEach(span => span.remove());
        }, delay + 500); 

        delay += 500; // Time for disintegration animation

        // PHASE 3: Assembly (Letters fly out from Anchors) (1000ms)
        
        // F (index 0) - Flies out from L (index 1) to the left
        const F_FinalPos = finalPositions[0];
        setTimeout(() => {
            finalLetters[0].style.transform = `translate(${anchorLPos.x - F_FinalPos.x}px, 0)`; // Start F at L
            finalLetters[0].style.opacity = 1;
            setTimeout(() => {
                finalLetters[0].style.transform = 'translate(0, 0)'; // Fly to final
            }, 50);
        }, delay + 200); 

        // APPY (indices 2, 3, 4, 5) - Staggered flight right from L
        [2, 3, 4, 5].forEach((index, i) => {
            const finalPos = finalPositions[index];
            setTimeout(() => {
                const span = finalLetters[index];
                span.style.transform = `translate(${anchorLPos.x - finalPos.x}px, 0)`; // Start at L
                span.style.opacity = 1;
                setTimeout(() => {
                    span.style.transform = 'translate(0, 0)'; // Fly to final
                }, 50);
            }, delay + 300 + i * 150);
        });

        // RAPTOR (indices 8, 9, 10, 11, 12) - Staggered flight right from R
        [8, 9, 10, 11, 12].forEach((index, i) => {
            const finalPos = finalPositions[index];
            setTimeout(() => {
                const span = finalLetters[index];
                span.style.transform = `translate(${anchorRPos.x - finalPos.x}px, 0)`; // Start at R
                span.style.opacity = 1;
                setTimeout(() => {
                    span.style.transform = 'translate(0, 0)'; // Fly to final
                }, 50);
            }, delay + 1000 + i * 150);
        });
        
        delay += 2000; // Time for assembly animation

        // PHASE 4: Final Glow effect
        setTimeout(() => {
            titleContainer.classList.add('glow');
        }, delay);
    }


    // --- GAME CONSTANTS AND VARIABLES ---

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const messageOverlay = document.getElementById('messageOverlay');
    const currentScoreDisplay = document.getElementById('currentScore');

    let animationFrameId;
    let gameSpeed = 3;
    let pipeGap = 120; // Reduced gap for a more compact game
    let pipeWidth = 45; // Slightly thinner pipes
    let pipeInterval = 1500; // milliseconds
    let lastPipeTime = 0;

    let raptor = {
        x: 60, // Starting closer to the left
        y: 150,
        size: 20, // Reduced size
        gravity: 0.35, // Adjusted gravity
        velocity: 0,
        lift: -7, // Adjusted lift
        isFlapping: false,
        flapFrame: 0, // 0: wings down, 1: wings up
        flapSpeed: 5 // Switch frame every 5 frames
    };
    
    // Raptor body/collision size for checkCollision()
    const raptorCollisionRadius = raptor.size * 0.8; 

    let gameState = {
        isGameOver: false,
        isGameStarted: false,
        score: 0,
        frame: 0
    };

    let pipes = [];

    // --- CANVAS RESIZING ---
    function resizeCanvas() {
        // Maintain a reasonable aspect ratio (e.g., 600x300 - more compact)
        canvas.height = 300;
        // The width is handled by CSS to be 100% of the container
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Initial call

    // --- DRAWING FUNCTIONS ---

    // Draws the Flappy Raptor with a more detailed, side-view silhouette
    function drawRaptor() {
        const R = raptor.size; // 20
        const primaryColor = '#10b981'; // Emerald 500 (Body)
        const secondaryColor = '#059669'; // Emerald 600 (Wings/Shadow)

        ctx.save();
        ctx.translate(raptor.x, raptor.y);
        // Tilt the raptor based on velocity for visual feedback
        ctx.rotate(raptor.velocity * 0.05);

        // Body (More raptor-like silhouette)
        ctx.fillStyle = primaryColor;
        ctx.beginPath();
        
        // Head/Snout (pointy)
        ctx.moveTo(R * 1.5, -R * 0.1); // Snout tip
        ctx.lineTo(R * 0.5, -R * 0.8); // Head top
        
        // Back/Neck
        ctx.lineTo(-R * 0.5, -R * 0.6);
        
        // Main body hump
        ctx.lineTo(-R * 1.0, R * 0.5);
        
        // Tail
        ctx.lineTo(-R * 2.5, R * 0.4); // Tail end
        ctx.lineTo(-R * 1.5, -R * 0.1);
        ctx.lineTo(R * 1.5, -R * 0.1); // Close back to snout tip
        
        ctx.closePath();
        ctx.fill();

        // Eye (Black)
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(R * 0.8, -R * 0.5, R * 0.1, 0, 2 * Math.PI);
        ctx.fill();

        // Single Wing (Darker Color) - Animated based on flapFrame
        ctx.fillStyle = secondaryColor;
        const wingAttachX = -R * 0.5;
        const wingAttachY = -R * 0.2;

        if (raptor.flapFrame === 0) { // Wings Down
            ctx.beginPath();
            ctx.moveTo(wingAttachX, wingAttachY);
            ctx.lineTo(wingAttachX - R * 1.5, wingAttachY + R * 1.0); // Downward sweep
            ctx.lineTo(wingAttachX + R * 0.2, wingAttachY + R * 0.5);
            ctx.closePath();
            ctx.fill();

        } else { // Wings Up
            ctx.beginPath();
            ctx.moveTo(wingAttachX, wingAttachY);
            ctx.lineTo(wingAttachX - R * 1.5, wingAttachY - R * 1.0); // Upward sweep
            ctx.lineTo(wingAttachX + R * 0.2, wingAttachY - R * 0.5);
            ctx.closePath();
            ctx.fill();
        }

        ctx.restore();
    }

    function drawPipes() {
        ctx.fillStyle = '#4f7d4c'; // Darker jungle green
        ctx.strokeStyle = '#3c6255';
        ctx.lineWidth = 3;

        pipes.forEach(p => {
            // Top Pipe
            ctx.fillRect(p.x, 0, pipeWidth, p.topHeight);
            ctx.strokeRect(p.x, 0, pipeWidth, p.topHeight);

            // Bottom Pipe
            const bottomY = p.topHeight + pipeGap;
            const bottomHeight = canvas.height - bottomY - 6; // -6 for ground border
            ctx.fillRect(p.x, bottomY, pipeWidth, bottomHeight);
            ctx.strokeRect(p.x, bottomY, pipeWidth, bottomHeight);
        });
    }

    function drawScore() {
        currentScoreDisplay.textContent = gameState.score;
        document.getElementById('highScore').textContent = currentHighScore;
    }

    // --- GAME LOGIC ---

    function resetGame() {
        raptor.y = canvas.height / 2;
        raptor.velocity = 0;
        raptor.isFlapping = false;
        raptor.flapFrame = 0;
        pipes = [];
        gameState.score = 0;
        gameState.isGameOver = false;
        gameState.isGameStarted = false;
        gameState.frame = 0;
        currentScoreDisplay.textContent = 0;
        messageOverlay.classList.remove('hidden');
        document.getElementById('messageTitle').textContent = "FLAPPY RAPTOR";
        document.getElementById('messageText').innerHTML = "Click, tap, or press **SPACE** to jump and start!";
        setupTitleAnimation(); // Re-run animation on reset
    }

    function jump() {
        if (gameState.isGameOver) {
            resetGame();
            return;
        }
        if (!gameState.isGameStarted) {
            gameState.isGameStarted = true;
            messageOverlay.classList.add('hidden');
            gameLoop();
            return;
        }

        raptor.velocity = raptor.lift;
        raptor.isFlapping = true;
    }

    function updateRaptor() {
        // Apply gravity and velocity
        raptor.velocity += raptor.gravity;
        raptor.y += raptor.velocity;

        // Animate flapping wings
        if (gameState.frame % raptor.flapSpeed === 0) {
            raptor.flapFrame = 1 - raptor.flapFrame; // Toggle 0 and 1
        }
    }

    function addPipe() {
        // Randomly determine the height of the top pipe
        const groundHeight = 6;
        const minHeight = 40;
        const maxHeight = canvas.height - pipeGap - minHeight - groundHeight;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;

        pipes.push({
            x: canvas.width,
            topHeight: topHeight,
            scored: false
        });
    }

    function updatePipes(deltaTime) {
        // Time-based pipe generation
        const now = performance.now();
        if (now - lastPipeTime > pipeInterval) {
            addPipe();
            lastPipeTime = now;
        }

        // Move and update pipes
        for (let i = pipes.length - 1; i >= 0; i--) {
            const p = pipes[i];
            p.x -= gameSpeed;

            // Check for scoring (raptor has passed the pipe's horizontal center)
            if (p.x + pipeWidth < raptor.x - raptor.size && !p.scored) {
                gameState.score++;
                p.scored = true;
            }

            // Remove pipe if off-screen
            if (p.x + pipeWidth < 0) {
                pipes.splice(i, 1);
            }
        }
    }

    function checkCollision() {
        const groundHeight = 6;
        
        // 1. Ground/Ceiling
        if (raptor.y + raptorCollisionRadius >= canvas.height - groundHeight || raptor.y - raptorCollisionRadius <= 0) {
            return true;
        }

        // 2. Pipes (using bounding box collision for simplicity)
        for (const p of pipes) {
            // Check if raptor is horizontally aligned with the pipe
            if (raptor.x + raptorCollisionRadius > p.x && raptor.x - raptorCollisionRadius < p.x + pipeWidth) {
                
                // Check if raptor hits the top pipe
                if (raptor.y - raptorCollisionRadius < p.topHeight) {
                    return true;
                }
                
                // Check if raptor hits the bottom pipe
                const bottomY = p.topHeight + pipeGap;
                if (raptor.y + raptorCollisionRadius > bottomY) {
                    return true;
                }
            }
        }
        return false;
    }

    function endGame() {
        gameState.isGameOver = true;
        cancelAnimationFrame(animationFrameId);
        updateHighScore(gameState.score); // Attempt to save high score

        messageOverlay.classList.remove('hidden');
        document.getElementById('messageTitle').textContent = "GAME OVER!";
        document.getElementById('messageText').innerHTML = `Your Score: <span class="text-yellow-400 font-bold">${gameState.score}</span><br>Click, tap, or press **SPACE** to restart.`;
    }

    // --- GAME LOOP ---

    let lastTime = 0;
    function gameLoop(timestamp) {
        if (gameState.isGameOver || !gameState.isGameStarted) return;

        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        // 1. Clear Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 2. Update Logic
        updateRaptor();

        if (checkCollision()) {
            endGame();
            return;
        }

        updatePipes(deltaTime);

        // 3. Draw Elements
        drawPipes();
        drawRaptor();
        drawScore();

        gameState.frame++;
        animationFrameId = requestAnimationFrame(gameLoop);
    }

    // --- INPUT HANDLERS ---
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            jump();
        }
    });

    canvas.addEventListener('mousedown', () => jump());
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });

    // Start the game on window load
    window.onload = function () {
        // Wait for Firebase to attempt authentication before potentially showing the message
        const checkAuthAndInit = setInterval(() => {
            if (isAuthReady) {
                clearInterval(checkAuthAndInit);
                resetGame(); // Show the initial start screen and trigger title animation
            }
        }, 100);
    };

</script>
</body>
</html>
