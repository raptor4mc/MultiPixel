<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapturo AI Core</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="ui-controls">
            <h2>AI Control</h2>
            <div class="control-group">
                <label>System State</label>
                <button id="btn-start" class="btn primary">Start Cycle</button>
                <button id="btn-pause" class="btn warning">Pause</button>
            </div>
            <div class="control-group">
                <label>Information Feed</label>
                <input type="text" id="input-data" placeholder="Inject context...">
                <button id="btn-inject" class="btn secondary">Inject Data</button>
            </div>
            <div class="control-group">
                <label>Processing Speed (<span id="speed-val">1000</span>ms)</label>
                <input type="range" id="slider-speed" min="100" max="3000" step="100" value="1000">
            </div>
        </aside>

        <main class="viz-area">
            <canvas id="flow-canvas"></canvas>
            <div id="ai-status-overlay">
                <h3>Current State: <span id="state-display">IDLE</span></h3>
                <div class="thinking-process">
                    <div class="step" id="step-perceive">Perceive</div>
                    <div class="step" id="step-reason">Reason</div>
                    <div class="step" id="step-plan">Plan</div>
                    <div class="step" id="step-act">Act</div>
                </div>
            </div>
        </main>

        <aside class="sidebar right">
            <h2>Memory & Logs</h2>
            <div id="memory-view" class="panel">
                <h4>Short Term Memory</h4>
                <ul id="memory-list"></ul>
            </div>
            <div id="log-view" class="panel terminal">
                </div>
        </aside>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
