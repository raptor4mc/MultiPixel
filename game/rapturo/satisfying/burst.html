<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Burst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        #combo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-style: italic;
        }
        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        #message-box {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="text-4xl font-black italic tracking-tighter" id="score">SCORE: 0</div>
        <div class="text-xl font-bold text-cyan-400" id="multiplier">1.0x MULTIPLIER</div>
    </div>

    <div id="combo-container" class="text-white">50</div>
    <div id="message-box">AWESOME!</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const multEl = document.getElementById('multiplier');
        const comboEl = document.getElementById('combo-container');
        const msgBox = document.getElementById('message-box');

        let width, height;
        let score = 0;
        let multiplier = 1;
        let particles = [];
        let targets = [];
        let ripples = [];
        let lastTime = 0;
        let gameActive = true;
        let shakeAmount = 0;
        let slowMo = 1; // 1 = normal, < 1 = slow
        let comboCount = 0;

        const COLORS = [
            '#FF0055', // Hot Pink
            '#00FFCC', // Cyan
            '#AAFF00', // Lime
            '#FFCC00', // Gold
            '#9900FF'  // Purple
        ];

        class Target {
            constructor() {
                this.radius = Math.random() * 20 + 30;
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = Math.random() * (height - this.radius * 2) + this.radius;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.maxLife = 2000 + Math.random() * 1000;
                this.life = this.maxLife;
                this.scale = 0;
                this.pulse = 0;
            }

            update(dt) {
                this.life -= dt / slowMo;
                this.pulse += 0.05;
                if (this.scale < 1) this.scale += 0.1;
                return this.life > 0;
            }

            draw() {
                const s = this.scale + Math.sin(this.pulse) * 0.05;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(s, s);
                
                // Glow
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.globalAlpha = 0.3;
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // Timer Ring
                ctx.globalAlpha = 1;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 10, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * (this.life / this.maxLife)));
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx * slowMo;
                this.y += this.vy * slowMo;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnTarget() {
            if (targets.length < 6) {
                targets.push(new Target());
            }
            setTimeout(spawnTarget, Math.random() * 800 + 200);
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle(x, y, color));
            }
            
            // Hit stop effect
            slowMo = 0.1;
            setTimeout(() => slowMo = 1, 50);
            
            // Screen shake
            shakeAmount = 15;
            
            // Score Logic
            comboCount++;
            multiplier = 1 + (comboCount * 0.1);
            score += Math.floor(100 * multiplier);
            
            scoreEl.innerText = `SCORE: ${score.toLocaleString()}`;
            multEl.innerText = `${multiplier.toFixed(1)}x MULTIPLIER`;
            multEl.style.color = COLORS[Math.floor(Math.random() * COLORS.length)];

            // Combo UI
            if (comboCount > 5) {
                comboEl.innerText = comboCount;
                comboEl.style.opacity = 0.8;
                comboEl.style.transform = `translate(-50%, -50%) scale(${1 + (comboCount * 0.05)})`;
                setTimeout(() => { if(comboCount > 5) comboEl.style.opacity = 0; }, 500);
            }

            if (comboCount % 10 === 0) {
                showMessage(["UNSTOPPABLE!", "GODLIKE!", "INSANE!", "BOOM!"][Math.floor(Math.random() * 4)]);
            }
        }

        function showMessage(text) {
            msgBox.innerText = text;
            msgBox.style.opacity = 1;
            setTimeout(() => msgBox.style.opacity = 0, 1000);
        }

        function handleInput(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            let hit = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dist = Math.sqrt((clientX - t.x)**2 + (clientY - t.y)**2);
                if (dist < t.radius + 20) {
                    createExplosion(t.x, t.y, t.color);
                    targets.splice(i, 1);
                    hit = true;
                    break;
                }
            }

            if (!hit) {
                comboCount = 0;
                multiplier = 1;
                multEl.innerText = `1.0x MULTIPLIER`;
                multEl.style.color = '#00FFCC';
            }
        }

        function update(time) {
            const dt = time - lastTime;
            lastTime = time;

            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Motion blur trail
            ctx.fillRect(0, 0, width, height);

            if (shakeAmount > 0) {
                const sx = (Math.random() - 0.5) * shakeAmount;
                const sy = (Math.random() - 0.5) * shakeAmount;
                ctx.translate(sx, sy);
                shakeAmount *= 0.9;
            }

            // Draw and Update
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });

            targets = targets.filter(t => {
                const alive = t.update(dt);
                if (alive) {
                    t.draw();
                } else {
                    // Missed target penalty
                    comboCount = 0;
                    multiplier = 1;
                }
                return alive;
            });

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            requestAnimationFrame(update);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', handleInput);

        resize();
        spawnTarget();
        requestAnimationFrame(update);
    </script>
</body>
</html>
