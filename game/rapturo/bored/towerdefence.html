<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower defence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; overflow: hidden; touch-action: none; font-family: 'Inter', sans-serif; }
        canvas { display: block; background: #020617; cursor: crosshair; }
        .tower-btn:disabled, .ability-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        #upgrade-menu { transform: translate(-50%, -100%); transition: opacity 0.2s; }
        ::-webkit-scrollbar { width: 0px; }
        
        .sidebar { width: 160px; } 
        .armory-grid { grid-template-columns: repeat(2, 1fr); }
        
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(225, 29, 72, 0.2); }
            50% { background-color: rgba(225, 29, 72, 0.5); }
        }
        .low-hp { animation: pulse-red 1s infinite; }
    </style>
</head>
<body class="flex h-screen w-screen text-slate-200">

    <!-- Game Area (Left) -->
    <div id="game-container" class="flex-grow h-full relative overflow-hidden bg-slate-950">
        <canvas id="gameCanvas"></canvas>

        <!-- Upgrade Menu -->
        <div id="upgrade-menu" class="hidden absolute p-2 bg-slate-900/95 border border-white/20 rounded shadow-2xl pointer-events-auto flex flex-col gap-1 min-w-[120px] z-50 backdrop-blur-md">
            <div class="text-[9px] font-black uppercase text-center border-b border-white/10 pb-1" id="upgrade-title">Tower</div>
            <button onclick="upgradeSelectedTower()" id="upgrade-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold py-1 px-2 rounded flex justify-between items-center transition-all">
                <span>UPG</span>
                <span id="upgrade-cost">$0</span>
            </button>
            <button onclick="sellSelectedTower()" class="bg-slate-800 hover:bg-rose-900/50 text-rose-400 text-[10px] font-bold py-1 px-2 rounded border border-white/5 transition-all">
                SELL ($<span id="sell-value">0</span>)
            </button>
            <button onclick="closeUpgradeMenu()" class="text-[8px] text-slate-500 hover:text-white pt-1 text-center uppercase font-bold">Close</button>
        </div>

        <!-- Ability Overlay Messages -->
        <div id="status-overlay" class="pointer-events-none absolute inset-0 flex items-center justify-center">
            <div id="status-text" class="text-4xl font-black italic text-white opacity-0 transition-opacity duration-500"></div>
        </div>

        <div id="game-over" class="hidden absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[100]">
            <h1 class="text-5xl font-black text-rose-600 mb-2 italic tracking-tighter" style="text-shadow: 0 0 20px #e11d48">SYSTEM COLLAPSE</h1>
            <p class="text-lg mb-8 text-slate-400">Waves Cleared: <span id="final-wave" class="text-white">0</span></p>
            <button onclick="location.reload()" class="bg-sky-500 text-white font-black px-8 py-3 rounded-lg text-xl hover:scale-105 transition-transform shadow-lg shadow-sky-500/20">REBOOT SYSTEM</button>
        </div>
    </div>

    <!-- Shop Sidebar (Right) -->
    <div id="sidebar" class="sidebar h-full bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl z-40">
        <div class="p-3 bg-slate-950 border-b border-slate-800">
            <div class="flex justify-between items-center mb-1">
                <div class="text-[11px] font-bold text-slate-500 uppercase">Wave <span id="wave-val" class="text-white text-base">0</span></div>
                <div id="wave-msg" class="text-[8px] text-sky-400 font-bold uppercase tracking-widest">Ready</div>
            </div>
            
            <div class="space-y-0.5 mb-3">
                <div class="text-[10px] font-bold text-rose-500 uppercase tracking-tighter">Life = <span id="hp-val">20</span></div>
                <div class="text-[10px] font-bold text-emerald-400 uppercase tracking-tighter">Credits = <span id="money-val">400</span></div>
            </div>

            <button onclick="nextWave()" id="next-wave-btn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-2 rounded shadow-lg active:scale-95 transition-all uppercase tracking-tighter text-[10px]">
                Deploy Wave
            </button>
        </div>

        <!-- Scrollable Shop Content -->
        <div class="flex-grow overflow-y-auto p-2 space-y-4">
            <!-- Armory -->
            <section>
                <div class="text-[8px] uppercase tracking-widest text-slate-500 font-black mb-2 px-1">Armory</div>
                <div id="tower-grid" class="armory-grid grid gap-1.5"></div>
            </section>

            <!-- Specials -->
            <section>
                <div class="text-[8px] uppercase tracking-widest text-sky-500 font-black mb-2 px-1">Tactical Ops</div>
                <div class="grid gap-1.5">
                    <button id="ability-nuke" onclick="triggerAbility('nuke')" class="ability-btn bg-slate-800 p-1.5 rounded border border-sky-900/50 flex flex-col items-center">
                        <span class="text-[8px] font-black text-sky-400">ION STRIKE</span>
                        <span class="text-[9px] font-bold">$300</span>
                    </button>
                    <button id="ability-heal" onclick="triggerAbility('heal')" class="ability-btn bg-slate-800 p-1.5 rounded border border-rose-900/50 flex flex-col items-center">
                        <span class="text-[8px] font-black text-rose-400">REPAIR SYS</span>
                        <span class="text-[9px] font-bold">$150</span>
                    </button>
                </div>
            </section>
        </div>

        <div class="p-1 bg-slate-950 text-[7px] text-slate-700 text-center border-t border-slate-800 uppercase font-bold">
            Tactical Command v3.0
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 48;

        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const TOWER_TYPES = {
            basic: { name: 'Laser', cost: 50, range: 140, damage: 22, speed: 12, color: '#22c55e', bulletColor: '#4ade80' },
            sniper: { name: 'Railgun', cost: 250, range: 400, damage: 320, speed: 120, color: '#ef4444', bulletColor: '#fca5a5' },
            slow: { name: 'Frost', cost: 120, range: 110, damage: 10, speed: 18, color: '#06b6d4', bulletColor: '#67e8f9', effect: 'slow' },
            plasma: { name: 'Plasma', cost: 400, range: 180, damage: 65, speed: 8, color: '#f59e0b', bulletColor: '#fbbf24' },
            venom: { name: 'Venom', cost: 200, range: 130, damage: 5, speed: 15, color: '#a3e635', bulletColor: '#bef264', effect: 'poison' },
            tesla: { name: 'Tesla', cost: 650, range: 130, damage: 160, speed: 45, color: '#8b5cf6', bulletColor: '#a78bfa', effect: 'chain' },
            artillery: { name: 'Artillery', cost: 950, range: 550, damage: 750, speed: 200, color: '#ec4899', bulletColor: '#f472b6', effect: 'splash' },
            minigun: { name: 'MiniG', cost: 1200, range: 160, damage: 35, speed: 3, color: '#94a3b8', bulletColor: '#cbd5e1' }
        };

        let money = 400;
        let hp = 20;
        let wave = 0;
        let enemies = [];
        let towers = [];
        let projectiles = [];
        let particles = [];
        let selectedTowerType = 'basic';
        let activeTowerObj = null;
        let isWaveActive = false;
        let gameOver = false;
        let mousePos = { x: 0, y: 0 };
        let screenShake = 0;

        function getCellCenter(coord) {
            return Math.floor(coord / GRID_SIZE) * GRID_SIZE + (GRID_SIZE / 2);
        }

        function getPath() {
            const w = canvas.width;
            const h = canvas.height;
            const centerY = getCellCenter(h * 0.5);
            const quarterY = getCellCenter(h * 0.2);
            const threeQuarterY = getCellCenter(h * 0.8);
            
            const turn1X = getCellCenter(w * 0.25);
            const turn2X = getCellCenter(w * 0.5);
            const turn3X = getCellCenter(w * 0.75);

            return [
                {x: -GRID_SIZE, y: centerY}, 
                {x: turn1X, y: centerY}, 
                {x: turn1X, y: quarterY}, 
                {x: turn2X, y: quarterY}, 
                {x: turn2X, y: threeQuarterY}, 
                {x: turn3X, y: threeQuarterY}, 
                {x: turn3X, y: centerY}, 
                {x: w + GRID_SIZE, y: centerY}
            ];
        }

        function isOnPath(mx, my) {
            const pathPoints = getPath();
            const buffer = GRID_SIZE * 0.45;
            for(let i=0; i<pathPoints.length-1; i++) {
                const p1 = pathPoints[i]; const p2 = pathPoints[i+1];
                const minX = Math.min(p1.x, p2.x) - buffer; const maxX = Math.max(p1.x, p2.x) + buffer;
                const minY = Math.min(p1.y, p2.y) - buffer; const maxY = Math.max(p1.y, p2.y) + buffer;
                if (mx >= minX && mx <= maxX && my >= minY && my <= maxY) return true;
            }
            return false;
        }

        function triggerAbility(type) {
            if (type === 'nuke' && money >= 300) {
                money -= 300;
                screenShake = 20;
                enemies.forEach(e => e.hp -= 1000);
                flashText("ION STRIKE");
            } else if (type === 'heal' && money >= 150) {
                money -= 150;
                hp = Math.min(20, hp + 5);
                flashText("+5 SYSTEM REPAIR");
            }
        }

        function flashText(txt) {
            const el = document.getElementById('status-text');
            el.innerText = txt;
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 1000);
        }

        function createExplosion(x, y, color, count=5) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random()-0.5)*10,
                    vy: (Math.random()-0.5)*10,
                    life: 20,
                    color: color
                });
            }
        }

        class Enemy {
            constructor(waveNum, variant = 'normal') {
                const pathPoints = getPath();
                this.variant = variant;
                this.x = pathPoints[0].x; this.y = pathPoints[0].y;
                this.targetIdx = 1;
                const hMult = Math.pow(1.3, waveNum - 1);
                this.hasShield = (waveNum > 4 && Math.random() < 0.2);
                this.shieldHp = this.hasShield ? 2 : 0;

                if (variant === 'boss') {
                    this.maxHp = 2500 * hMult; this.speed = 0.6; this.radius = 22; this.reward = 350; this.color = '#fbbf24';
                } else if (variant === 'fast') {
                    this.maxHp = 60 * hMult; this.speed = 4.0; this.radius = 8; this.reward = 20; this.color = '#60a5fa';
                } else if (variant === 'tank') {
                    this.maxHp = 400 * hMult; this.speed = 0.8; this.radius = 16; this.reward = 60; this.color = '#94a3b8';
                } else {
                    this.maxHp = 100 * hMult; this.speed = 1.6; this.radius = 11; this.reward = 15; this.color = '#f43f5e';
                }
                this.hp = this.maxHp;
                this.slowed = 0;
                this.poisoned = 0;
                this.distanceTraveled = 0;
            }
            update() {
                if (this.slowed > 0) this.slowed--;
                if (this.poisoned > 0) { this.hp -= 0.5; this.poisoned--; }
                
                const pathPoints = getPath();
                const target = pathPoints[this.targetIdx];
                const dx = target.x - this.x; const dy = target.y - this.y;
                const distToNode = Math.hypot(dx, dy);
                const currentSpeed = this.slowed > 0 ? this.speed * 0.4 : this.speed;
                
                if (distToNode < currentSpeed) {
                    this.x = target.x; this.y = target.y;
                    this.targetIdx++;
                    if (this.targetIdx >= pathPoints.length) { 
                        hp -= (this.variant === 'boss' ? 10 : 1); 
                        screenShake = 10;
                        return false; 
                    }
                } else {
                    this.x += (dx / distToNode) * currentSpeed; this.y += (dy / distToNode) * currentSpeed;
                    this.distanceTraveled += currentSpeed;
                }
                return this.hp > 0;
            }
            draw() {
                ctx.save();
                if (this.hasShield && this.shieldHp > 0) {
                    ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 2; ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.fillStyle = this.poisoned > 0 ? '#a3e635' : (this.slowed > 0 ? '#06b6d4' : this.color);
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                
                // HP Bar
                ctx.fillStyle = '#1e293b'; ctx.fillRect(this.x - 12, this.y - 18, 24, 4);
                ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x - 12, this.y - 18, (this.hp / this.maxHp) * 24, 4);
                ctx.restore();
            }
        }

        class Tower {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.level = 1; this.totalSpent = TOWER_TYPES[type].cost;
                this.updateStats();
                this.cooldown = 0; this.angle = 0;
            }
            updateStats() {
                const base = TOWER_TYPES[this.type];
                this.range = base.range * (1 + (this.level-1)*0.08); 
                this.damage = base.damage * Math.pow(1.3, this.level - 1);
                this.fireRate = base.speed;
                this.color = base.color;
                this.bulletColor = base.bulletColor;
                this.upgradeCost = Math.floor(base.cost * 1.5 * Math.pow(1.6, this.level - 1));
            }
            upgrade() {
                if (money >= this.upgradeCost) {
                    money -= this.upgradeCost; this.totalSpent += this.upgradeCost;
                    this.level++; this.updateStats(); return true;
                } return false;
            }
            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.cooldown <= 0) {
                    let target = null; let maxDist = -1;
                    for (const enemy of enemies) {
                        const d = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        if (d <= this.range && enemy.distanceTraveled > maxDist) { maxDist = enemy.distanceTraveled; target = enemy; }
                    }
                    if (target) {
                        this.angle = Math.atan2(target.y - this.y, target.x - this.x);
                        projectiles.push(new Projectile(this.x, this.y, target, this));
                        this.cooldown = this.fireRate;
                        if (this.type === 'artillery') screenShake = 2;
                    }
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = '#0f172a'; ctx.beginPath();
                ctx.roundRect(-16, -16, 32, 32, 4); ctx.fill();
                ctx.strokeStyle = this.color; ctx.lineWidth = 1.5 + (this.level * 0.4);
                ctx.stroke();
                ctx.rotate(this.angle); ctx.fillStyle = this.color;
                if (this.type === 'sniper' || this.type === 'artillery') ctx.fillRect(-2, -6, 24, 12);
                else if (this.type === 'minigun') { ctx.fillRect(10, -5, 12, 4); ctx.fillRect(10, 1, 12, 4); }
                else ctx.fillRect(-3, -3, 20, 6);
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                ctx.fillStyle = "white"; ctx.font = "900 10px Inter"; ctx.textAlign = "center";
                ctx.fillText(this.level, this.x, this.y + 4);
            }
        }

        class Projectile {
            constructor(x, y, target, tower) {
                this.x = x; this.y = y; this.target = target;
                this.damage = tower.damage;
                this.speed = (tower.type === 'sniper' || tower.type === 'artillery') ? 28 : 14;
                this.color = tower.bulletColor;
                this.type = tower.type;
                this.active = true;
            }
            update() {
                if (!enemies.includes(this.target)) { this.active = false; return; }
                const dx = this.target.x - this.x; const dy = this.target.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < this.speed) {
                    this.hit(this.target);
                    this.active = false;
                } else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
            }
            hit(target) {
                if (this.type === 'splash' || this.type === 'artillery') {
                    createExplosion(this.x, this.y, this.color, 15);
                    enemies.forEach(e => {
                        if (Math.hypot(e.x - this.x, e.y - this.y) < 80) e.hp -= this.damage;
                    });
                } else {
                    if (target.hasShield && target.shieldHp > 0) target.shieldHp--;
                    else {
                        target.hp -= this.damage;
                        if (this.type === 'slow') target.slowed = 120;
                        if (this.type === 'venom') target.poisoned = 240;
                        if (this.type === 'chain') {
                            const others = enemies.filter(e => e !== target && Math.hypot(e.x - target.x, e.y - target.y) < 100);
                            others.slice(0, 3).forEach(o => o.hp -= this.damage * 0.5);
                        }
                    }
                    createExplosion(this.x, this.y, this.color, 3);
                }
            }
            draw() {
                ctx.fillStyle = this.color; ctx.beginPath();
                ctx.arc(this.x, this.y, this.type === 'artillery' ? 5 : 2.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function nextWave() {
            if (isWaveActive) return;
            wave++; isWaveActive = true;
            const isBoss = wave % 5 === 0;
            const count = isBoss ? 1 : 12 + (wave * 4);
            let spawned = 0;
            document.getElementById('wave-msg').innerText = isBoss ? "BOSS DETECTED" : "WAVE ACTIVE";
            const interval = setInterval(() => {
                if (gameOver) { clearInterval(interval); return; }
                let variant = 'normal';
                if (!isBoss) {
                    const r = Math.random();
                    if (wave > 3 && r < 0.25) variant = 'fast';
                    else if (wave > 6 && r < 0.35) variant = 'tank';
                } else variant = 'boss';
                enemies.push(new Enemy(wave, variant));
                spawned++;
                if (spawned >= count) clearInterval(interval);
            }, 350 - Math.min(250, wave * 8));
        }

        function buildShop() {
            const grid = document.getElementById('tower-grid');
            grid.innerHTML = '';
            Object.entries(TOWER_TYPES).forEach(([key, tower]) => {
                const btn = document.createElement('button');
                btn.id = `btn-${key}`;
                btn.onclick = () => selectTower(key);
                btn.className = `tower-btn bg-slate-800/60 p-1.5 rounded border border-slate-700 hover:border-white/30 transition-all flex flex-col items-center justify-center text-center`;
                btn.innerHTML = `<span class="text-[8px] font-black uppercase block truncate w-full" style="color: ${tower.color}">${tower.name}</span><span class="text-emerald-400 font-bold text-[9px]">$${tower.cost}</span>`;
                grid.appendChild(btn);
            });
        }

        function selectTower(type) {
            selectedTowerType = type;
            Object.keys(TOWER_TYPES).forEach(k => {
                const b = document.getElementById(`btn-${k}`);
                b.style.borderColor = k === type ? 'white' : '';
                b.style.backgroundColor = k === type ? 'rgba(30, 41, 59, 1)' : '';
            });
            closeUpgradeMenu();
        }

        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            const clickedTower = towers.find(t => Math.hypot(t.x - mousePos.x, t.y - mousePos.y) < GRID_SIZE/2);
            if (clickedTower) { openUpgradeMenu(clickedTower); return; }
            closeUpgradeMenu();
            
            const snapX = getCellCenter(mousePos.x);
            const snapY = getCellCenter(mousePos.y);
            if (isOnPath(snapX, snapY) || towers.some(t => t.x === snapX && t.y === snapY)) return;
            
            const cost = TOWER_TYPES[selectedTowerType].cost;
            if (money >= cost) { money -= cost; towers.push(new Tower(snapX, snapY, selectedTowerType)); }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
        });

        function openUpgradeMenu(tower) {
            activeTowerObj = tower;
            const menu = document.getElementById('upgrade-menu');
            menu.style.display = 'flex';
            menu.style.left = tower.x + 'px';
            menu.style.top = (tower.y - 20) + 'px';
            updateUpgradeMenu();
        }

        function updateUpgradeMenu() {
            if (!activeTowerObj) return;
            const t = activeTowerObj;
            document.getElementById('upgrade-title').innerText = `Lvl ${t.level} ${TOWER_TYPES[t.type].name}`;
            document.getElementById('upgrade-title').style.color = TOWER_TYPES[t.type].color;
            document.getElementById('upgrade-cost').innerText = `$${t.upgradeCost}`;
            document.getElementById('sell-value').innerText = Math.floor(t.totalSpent * 0.5);
            document.getElementById('upgrade-btn').disabled = money < t.upgradeCost;
        }

        function closeUpgradeMenu() { activeTowerObj = null; document.getElementById('upgrade-menu').style.display = 'none'; }
        function upgradeSelectedTower() { if (activeTowerObj && activeTowerObj.upgrade()) updateUpgradeMenu(); }
        function sellSelectedTower() { if (activeTowerObj) { money += Math.floor(activeTowerObj.totalSpent * 0.5); towers = towers.filter(t => t !== activeTowerObj); closeUpgradeMenu(); } }

        function loop() {
            if (!gameOver) {
                document.getElementById('hp-val').innerText = hp;
                document.getElementById('money-val').innerText = money;
                document.getElementById('wave-val').innerText = wave;
                document.getElementById('sidebar').className = `sidebar h-full bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl z-40 ${hp <= 5 ? 'low-hp' : ''}`;
                
                Object.keys(TOWER_TYPES).forEach(k => document.getElementById(`btn-${k}`).disabled = money < TOWER_TYPES[k].cost);
                document.getElementById('ability-nuke').disabled = money < 300;
                document.getElementById('ability-heal').disabled = (money < 150 || hp >= 20);
                
                if (hp <= 0) {
                    gameOver = true;
                    document.getElementById('game-over').classList.remove('hidden');
                    document.getElementById('final-wave').innerText = wave;
                }

                enemies = enemies.filter(e => {
                    const alive = e.update();
                    if (e.hp <= 0) { money += e.reward; createExplosion(e.x, e.y, e.color, 10); }
                    return alive;
                });
                towers.forEach(t => t.update());
                projectiles = projectiles.filter(p => { p.update(); return p.active; });
                particles = particles.filter(p => {
                    p.x += p.vx; p.y += p.vy; p.life--;
                    return p.life > 0;
                });

                if (isWaveActive && enemies.length === 0) {
                    isWaveActive = false;
                    document.getElementById('wave-msg').innerText = "SYSTEM SECURE";
                    money += (wave * 30);
                }

                ctx.save();
                if (screenShake > 0) {
                    ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
                    screenShake *= 0.9;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw Grid
                ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
                for (let x = 0; x <= canvas.width; x += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
                for (let y = 0; y <= canvas.height; y += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
                
                const path = getPath();
                ctx.strokeStyle = '#1e293b'; ctx.lineWidth = GRID_SIZE * 0.95; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
                
                const core = path[path.length-2];
                ctx.fillStyle = '#f43f5e'; ctx.shadowBlur = 15; ctx.shadowColor = '#f43f5e';
                ctx.fillRect(core.x - 16, core.y - 16, 32, 32); ctx.shadowBlur = 0;

                if (!activeTowerObj) {
                    const snapX = getCellCenter(mousePos.x); const snapY = getCellCenter(mousePos.y);
                    const validPos = !isOnPath(snapX, snapY) && !towers.some(t => t.x === snapX && t.y === snapY);
                    ctx.strokeStyle = validPos ? TOWER_TYPES[selectedTowerType].color + '44' : '#ef444444';
                    ctx.beginPath(); ctx.arc(snapX, snapY, TOWER_TYPES[selectedTowerType].range, 0, Math.PI*2); ctx.stroke();
                    ctx.fillStyle = validPos ? TOWER_TYPES[selectedTowerType].color + '22' : '#ef444422';
                    ctx.fillRect(snapX - 20, snapY - 20, 40, 40);
                }

                enemies.forEach(e => e.draw());
                towers.forEach(t => t.draw());
                projectiles.forEach(p => p.draw());
                particles.forEach(p => {
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life/20;
                    ctx.fillRect(p.x, p.y, 2.5, 2.5);
                });
                ctx.globalAlpha = 1;
                ctx.restore();
            }
            requestAnimationFrame(loop);
        }

        buildShop();
        selectTower('basic');
        loop();
    </script>
</body>
</html>
