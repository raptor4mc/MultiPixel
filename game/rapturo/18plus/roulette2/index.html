<html> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Classic Arcade Wheel</title> 
<style>
  :root {
    --felt-green: #0a4d23;
    --border-white: #ffffff;
    --gold: #f2c94c;
    --red: #d90429;
    --black: #1a1a1a;
  }
  body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #052611; font-family: 'Arial', sans-serif; color: white; }

  /* UI HUD */
  .hud-bottom { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 40px; align-items: center; width: 90%; justify-content: space-between; pointer-events: none; }
  .hud-val { font-size: 28px; color: var(--gold); font-weight: bold; pointer-events: auto; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

  /* GAME BOARD */
  .game-container { 
    width: 100vw; height: 100vh; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle, #0d5c2a, #052611);
    box-sizing: border-box;
  }

  .table-layout { position: relative; display: flex; align-items: flex-start; user-select: none; border: 2px solid white; padding: 2px; background: var(--felt-green); }

  /* 0 and 00 block */
  .zero-column { display: flex; flex-direction: column; height: 100%; border-right: 2px solid white; }
  .zero-box {
    width: 70px; flex: 1; border-bottom: 2px solid white;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; cursor: pointer; position: relative;
    clip-path: polygon(0% 0%, 70% 0%, 100% 50%, 70% 100%, 0% 100%);
    background: var(--felt-green);
  }
  .zero-box:last-child { border-bottom: none; }

  /* Main Grid */
  .grid-wrapper { display: flex; }
  .numbers-grid { display: grid; grid-template-rows: repeat(3, 70px); grid-auto-flow: column; }
  .cell {
    width: 60px; height: 70px; border-right: 2px solid white; border-bottom: 2px solid white;
    display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer;
  }
  .cell.red { background: var(--red); border-radius: 50%; margin: 4px; width: 52px; height: 62px; }
  .cell.black { background: var(--black); border-radius: 50%; margin: 4px; width: 52px; height: 62px; }
  
  /* Outer cells are the containers for the circles */
  .cell-container { width: 60px; height: 70px; border-right: 2px solid white; border-bottom: 2px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }

  /* Column 2to1 labels */
  .col-labels { display: flex; flex-direction: column; border-bottom: 2px solid white; }
  .col-box { width: 50px; height: 70px; border-right: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 14px; writing-mode: vertical-rl; transform: rotate(180deg); }

  /* Bottom Blocks */
  .bottom-row { display: flex; flex-direction: column; border-left: 2px solid white; }
  .dozens { display: flex; border-bottom: 2px solid white; }
  .dozen-box { flex: 1; height: 60px; border-right: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

  .sub-row { display: flex; }
  .sub-box { flex: 1; height: 60px; border-right: 2px solid white; border-bottom: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; position: relative; }
  .diamond { width: 45px; height: 30px; transform: rotate(0deg); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

  /* CONTROLS */
  .chips-area { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
  .chip {
    width: 75px; height: 75px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: bold; border: 5px dashed rgba(255,255,255,0.6);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;
  }
  .chip.active { transform: scale(1.1) translateX(10px); border-color: white; }
  .chip-1 { background: #fff; color: #333; }
  .chip-10 { background: #0d47a1; color: white; }
  .chip-100 { background: #212121; color: white; }
  .chip-500 { background: #00838f; color: white; }

  .spin-container { position: fixed; bottom: 20px; right: 20px; pointer-events: auto; }
  .spin-btn {
    width: 110px; height: 110px; border-radius: 50%;
    background: url('https://img.icons8.com/color/96/roulette.png') center no-repeat, radial-gradient(circle, #444, #111);
    background-size: 70%; border: 4px solid #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px;
  }

  .undo-btn { position: fixed; top: 20px; left: 20px; width: 60px; height: 60px; border-radius: 50%; background: #222; border: 2px solid white; cursor: pointer; color: white; }

  /* 3D OVERLAY - WHEEL ON TOP */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 500;
    display: none; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .wheel-wrapper {
    width: 500px; height: 500px; background: #5d4037; border-radius: 50%;
    border: 15px solid #3e2723; box-shadow: 0 0 50px rgba(0,0,0,0.8);
    position: relative; overflow: hidden; pointer-events: auto;
  }
  canvas { width: 100% !important; height: 100% !important; }

  .chip-stack {
    position: absolute; width: 28px; height: 28px; border-radius: 50%;
    background: white; color: black; font-size: 11px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid gold; transform: translate(-50%, -50%);
    pointer-events: none; z-index: 20;
  }

  .win-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 70px; color: var(--gold); text-shadow: 0 0 30px #000;
    z-index: 600; display: none; text-align: center; font-weight: bold;
  }
</style>
</head> 
<body>

<button class="undo-btn" id="undo">Undo</button>

<div class="game-container">
  <div class="table-layout" id="table">
    <div class="zero-column">
      <div class="zero-box" data-bet="00">00</div>
      <div class="zero-box" data-bet="0">0</div>
    </div>
    <div class="main-table">
        <div class="grid-wrapper">
            <div class="numbers-grid" id="grid"></div>
            <div class="col-labels">
                <div class="col-box">3rd</div>
                <div class="col-box">2nd</div>
                <div class="col-box" style="border-bottom:none">1st</div>
            </div>
        </div>
        <div class="bottom-row">
            <div class="dozens">
                <div class="dozen-box" data-bet="1st12">1-12</div>
                <div class="dozen-box" data-bet="2nd12">13-24</div>
                <div class="dozen-box" data-bet="3rd12" style="border-right:none">25-36</div>
            </div>
            <div class="sub-row">
                <div class="sub-box" data-bet="1to18">1-18</div>
                <div class="sub-box" data-bet="even">EVEN</div>
                <div class="sub-box" data-bet="red"><div class="diamond" style="background:var(--red)"></div></div>
                <div class="sub-box" data-bet="black"><div class="diamond" style="background:var(--black)"></div></div>
                <div class="sub-box" data-bet="odd">ODD</div>
                <div class="sub-box" data-bet="19to36" style="border-right:none">19-36</div>
            </div>
        </div>
    </div>
  </div>
</div>

<div class="hud-bottom">
    <div class="hud-val" id="balanceText">$10,000</div>
    <div class="hud-val" id="betText">$0</div>
</div>

<div class="chips-area" id="chipSelect">
  <div class="chip chip-1 active" data-val="1">1</div>
  <div class="chip chip-10" data-val="10">10</div>
  <div class="chip chip-100" data-val="100">100</div>
  <div class="chip chip-500" data-val="500">500</div>
</div>

<div class="spin-container">
  <button class="spin-btn" id="spin">Spin</button>
</div>

<div class="overlay" id="wheelOverlay">
  <div class="wheel-wrapper">
    <canvas id="wheelCanvas"></canvas>
  </div>
</div>

<div class="win-msg" id="winMsg">WINNER!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const RED_NUMS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const WHEEL_ORDER = ['0', 28, 9, 26, 30, 11, 7, 20, 32, 17, 5, 22, 34, 15, 3, 24, 36, 13, 1, '00', 27, 10, 25, 29, 12, 8, 19, 31, 18, 6, 21, 33, 16, 4, 23, 35, 14, 2];

let balance = 10000;
let bets = []; 
let currentChip = 1;
let isSpinning = false;

// Build Grid
const grid = document.getElementById('grid');
// Roulette grid is usually 3 rows, vertical fill
for(let i=1; i<=36; i++) {
  const container = document.createElement('div');
  container.className = 'cell-container';
  container.dataset.bet = i;
  
  const cell = document.createElement('div');
  cell.className = `cell ${RED_NUMS.includes(i) ? 'red' : 'black'}`;
  cell.textContent = i;
  
  container.appendChild(cell);
  grid.appendChild(container);
}

function updateHUD() {
  document.getElementById('balanceText').textContent = '$' + balance.toLocaleString();
  const total = bets.reduce((a, b) => a + b.amount, 0);
  document.getElementById('betText').textContent = '$' + total.toLocaleString();
}

// Interaction
document.addEventListener('mousedown', (e) => {
  if(isSpinning) return;
  const betEl = e.target.closest('[data-bet]');
  if (betEl) {
    if (balance < currentChip) return;
    balance -= currentChip;
    
    let existing = bets.find(b => b.key === betEl.dataset.bet);
    if (existing) {
      existing.amount += currentChip;
      existing.stackEl.textContent = existing.amount;
    } else {
      const stack = document.createElement('div');
      stack.className = 'chip-stack';
      stack.textContent = currentChip;
      const rect = betEl.getBoundingClientRect();
      stack.style.left = (rect.left + rect.width / 2) + 'px';
      stack.style.top = (rect.top + rect.height / 2) + 'px';
      document.body.appendChild(stack);
      bets.push({ key: betEl.dataset.bet, amount: currentChip, stackEl: stack });
    }
    updateHUD();
  }
});

document.getElementById('chipSelect').onclick = (e) => {
  const c = e.target.closest('.chip');
  if (c) {
    document.querySelectorAll('.chip').forEach(el => el.classList.remove('active'));
    c.classList.add('active');
    currentChip = parseInt(c.dataset.val);
  }
};

document.getElementById('undo').onclick = () => {
  if(isSpinning) return;
  const last = bets.pop();
  if (last) {
    balance += last.amount;
    last.stackEl.remove();
    updateHUD();
  }
};

// 3D Wheel Overlay
let scene, camera, renderer, wheelObj, ballObj;
function init3D() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(35, 1, 0.1, 1000);
  camera.position.set(0, 25, 0);
  camera.lookAt(0,0,0);
  
  const canvas = document.getElementById('wheelCanvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(500, 500);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const light = new THREE.DirectionalLight(0xffffff, 0.5);
  light.position.set(5, 10, 5);
  scene.add(light);

  // Simple Wood Wheel
  const wheelGeo = new THREE.CylinderGeometry(10, 10.5, 2, 64);
  const wheelMat = new THREE.MeshPhongMaterial({ color: 0x3e2723 });
  wheelObj = new THREE.Mesh(wheelGeo, wheelMat);
  scene.add(wheelObj);

  // Inner details
  const innerGeo = new THREE.CylinderGeometry(8.5, 8.5, 2.1, 64);
  const innerMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
  const inner = new THREE.Mesh(innerGeo, innerMat);
  wheelObj.add(inner);

  // Ball
  ballObj = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshPhongMaterial({ color: 0xffffff }));
  scene.add(ballObj);
  ballObj.visible = false;
}

function animate() {
  requestAnimationFrame(animate);
  wheelObj.rotation.y += isSpinning ? 0.08 : 0.005;
  renderer.render(scene, camera);
}

document.getElementById('spin').onclick = () => {
  if (bets.length === 0 || isSpinning) return;
  
  isSpinning = true;
  // Guaranteed Win Logic: pick first bet
  let winKey = bets[0].key;
  let target = isNaN(winKey) ? (winKey === 'red' ? 1 : 2) : winKey;
  let resIdx = WHEEL_ORDER.indexOf(target === '0' || target === '00' ? target : parseInt(target));
  
  document.getElementById('wheelOverlay').style.display = 'flex';
  ballObj.visible = true;

  let start = Date.now();
  let duration = 3500;

  function loop() {
    let now = Date.now() - start;
    let t = Math.min(now / duration, 1);
    let orbit = 9.5 - (t * 1.5);
    let angle = t * -25;
    ballObj.position.x = Math.cos(angle) * orbit;
    ballObj.position.z = Math.sin(angle) * orbit;
    ballObj.position.y = 1.2 + Math.abs(Math.sin(t * 15)) * (1-t) * 2;

    if (t < 1) requestAnimationFrame(loop);
    else {
      setTimeout(() => finish(WHEEL_ORDER[resIdx]), 800);
    }
  }
  loop();
};

function finish(res) {
  document.getElementById('wheelOverlay').style.display = 'none';
  ballObj.visible = false;
  isSpinning = false;
  
  let win = 0;
  bets.forEach(b => {
    let match = false;
    let mult = 0;
    if (b.key == res) { match = true; mult = 36; }
    else if (b.key === 'red' && RED_NUMS.includes(res)) { match = true; mult = 2; }
    else if (b.key === 'black' && !RED_NUMS.includes(res) && res !== '0' && res !== '00') { match = true; mult = 2; }
    else if (b.key === 'even' && res % 2 === 0 && res !== '0' && res !== '00') { match = true; mult = 2; }
    else if (b.key === 'odd' && res % 2 !== 0) { match = true; mult = 2; }
    else if (b.key === '1st12' && res >= 1 && res <= 12) { match = true; mult = 3; }
    else if (b.key === '2nd12' && res >= 13 && res <= 24) { match = true; mult = 3; }
    else if (b.key === '3rd12' && res >= 25 && res <= 36) { match = true; mult = 3; }

    if (match) win += b.amount * mult;
  });

  if (win > 0) {
    const msg = document.getElementById('winMsg');
    msg.textContent = `WINNER! $${win}`;
    msg.style.display = 'block';
    balance += win;
    setTimeout(() => msg.style.display = 'none', 3000);
  }

  bets.forEach(b => b.stackEl.remove());
  bets = [];
  updateHUD();
}

init3D();
animate();
updateHUD();
</script>
</body> </html>
