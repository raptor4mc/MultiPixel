<!DOCTYPE html>
<html lang="en">
<head>

  <title>Create World</title>
  <link rel="stylesheet" href="singleplayer.css" />
</head>
<body>

<div id="app">
  <h1>Create World</h1>

  <input id="worldName" placeholder="World name" />

<script type="module" src="singleplayer.js"></script>
</body>
</html>
