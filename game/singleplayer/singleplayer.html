<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Singleplayer</title>
  <link rel="stylesheet" href="singleplayer.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>Create World</h1>

  <label>World Name</label>
  <input id="worldName" placeholder="My World">

  <label>Seed</label>
  <input id="seed" placeholder="Random">

  <label>Gamemode</label>
  <select id="gamemode">
    <option value="survival">Survival</option>
    <option value="creative">Creative</option>
  </select>

  <label>Terrain</label>
  <select id="terrain">
    <option value="normal">Normal</option>
    <option value="flat">Flat</option>
  </select>

  <button id="play">Create World</button>
</div>

<canvas id="game"></canvas>

<!-- REQUIRED FOR STEP 2 -->
<script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.3/gl-matrix-min.js"></script>

<script type="module" src="singleplayer.js"></script>
</body>
</html>
