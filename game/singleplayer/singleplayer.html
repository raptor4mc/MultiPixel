<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create World</title>
  <link rel="stylesheet" href="singleplayer.css" />
</head>
<body>

<div id="app">
  <h1>Create World</h1>

  <label>
    World Name
    <input id="worldName" placeholder="My World" />
  </label>

  <label>
    Seed
    <input id="seedInput" placeholder="Leave empty for random" />
  </label>

  <section>
    <h2>Gamemode</h2>
    <div id="gamemodeSelect"></div>
  </section>

  <section>
    <h2>Terrain</h2>
    <div id="terrainSelect"></div>
  </section>

  <button id="createWorld">Create World</button>
  <button id="loadWorld">Load World</button>
</div>

<script type="module" src="singleplayer.js"></script>
</body>
</html>
