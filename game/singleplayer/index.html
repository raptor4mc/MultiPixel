<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>
    <style>
        /* --- CSS Variables --- */
        :root {
            /* General UI */
            --ui-scale: 1;
            --symbol-size: 1rem;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --container-width: 850px;
            --container-height: 550px;
            --tab-alignment: flex-start;
            
            /* Visual Filters */
            --filter-brightness: 1;
            --filter-warmth: 0;
            --filter-coldness: 0;
            --filter-nightlight: 0;

            /* Theming */
            --menu-bg-color: rgba(45, 50, 55, 0.85); /* Classic Minetest grey */
            --btn-bg-img-unified: none;
            --btn-bg-img-sp: none; /* Singleplayer btn */
            --btn-bg-img-gh: none; /* Github btn */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-family);
            color: #ffffff;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* --- Boot & Splash Screens --- */
        #boot-overlay, #splash-screen, #black-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #boot-overlay {
            background: rgba(0,0,0,0.95);
            color: white;
            font-size: 2rem;
        }

        #splash-screen {
            background: #ffffff;
            display: none;
            z-index: 9998;
        }
        
        #splash-screen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #black-flash {
            background: #000000;
            display: none;
            z-index: 9997;
        }

        /* --- Background System --- */
        #background-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -5;
            background-color: #5ab1ee; /* Minetest sky fallback */
            filter: brightness(var(--filter-brightness));
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            image-rendering: pixelated; /* Blocky aesthetic */
        }

        .bg-layer.active {
            opacity: 1;
        }

        /* --- Visual Filters Overlays --- */
        .filter-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -4;
            pointer-events: none;
        }
        #warmth-overlay { background-color: rgba(255, 120, 0, var(--filter-warmth)); mix-blend-mode: overlay; }
        #coldness-overlay { background-color: rgba(0, 100, 255, var(--filter-coldness)); mix-blend-mode: overlay; }
        #nightlight-overlay { background-color: rgba(255, 160, 0, var(--filter-nightlight)); mix-blend-mode: multiply; z-index: 9990; } /* Over everything */

        /* --- Main App Container --- */
        #app-wrapper {
            display: none; /* Shown after splash */
            flex-direction: column;
            align-items: center;
            transform: scale(var(--ui-scale));
            transition: transform 0.2s;
        }

        /* Header / Logo above menu */
        #main-header {
            margin-bottom: -40px;
            height: 200px;
        }
        #main-header img {
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5)); /* Blocky shadow */
        }

        /* The Menu Window */
        #main-menu {
            width: var(--container-width);
            height: var(--container-height);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Menu Animations --- */
        .anim-breathe { animation: breathe 4s infinite ease-in-out; }
        .anim-pulse { animation: pulse 2s infinite ease-in-out; }
        .anim-float { animation: float 6s infinite ease-in-out; }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- Tabs --- */
        #tabs-bar {
            display: flex;
            justify-content: var(--tab-alignment);
            width: 100%;
        }

        .tab-btn {
            background-color: rgba(180, 180, 180, 0.4);
            color: #fff;
            border: 1px solid #777;
            border-bottom: none;
            padding: 10px 20px;
            font-family: inherit;
            font-size: var(--symbol-size);
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
            transition: background 0.2s;
        }

        .tab-btn:hover { background-color: rgba(200, 200, 200, 0.6); }
        .tab-btn.active {
            background-color: var(--menu-bg-color);
            font-weight: bold;
        }

        /* Specifically target the settings tab to push it right if needed */
        #tab-settings {
            margin-left: auto;
        }

        /* --- Content Area --- */
        #content-area {
            flex: 1;
            background-color: var(--menu-bg-color);
            border: 1px solid #555;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .view { display: none; height: 100%; }
        .view.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Shared Buttons (Image texturing support) --- */
        .action-btn {
            background-color: #555;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            color: #fff;
            border: 2px solid #333;
            padding: 15px 30px;
            font-size: calc(var(--symbol-size) * 1.2);
            cursor: pointer;
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.2), inset -2px -2px 0px rgba(0,0,0,0.5);
            text-shadow: 1px 1px 0px #000;
        }
        .action-btn:hover { filter: brightness(1.2); }
        .action-btn:active { box-shadow: inset 2px 2px 0px rgba(0,0,0,0.5), inset -2px -2px 0px rgba(255,255,255,0.2); }

        /* Specific Button mappings */
        #btn-singleplayer { background-image: var(--btn-bg-img-sp); }
        #btn-github { background-image: var(--btn-bg-img-gh); }

        /* --- View: Singleplayer --- */
        .centered-view {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        /* --- View: Developers / Credits (Matching Image 2) --- */
        .credits-container {
            display: flex;
            height: 100%;
            gap: 20px;
        }
        .credits-left {
            flex: 0 0 200px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
        }
        .credits-left img { width: 100%; object-fit: contain; }
        .credits-right {
            flex: 1;
            background-color: rgba(0,0,0,0.3);
            padding: 15px;
            overflow-y: auto;
            border: 1px solid #444;
        }
        .credits-right h2 { color: #ffd700; margin-bottom: 10px; font-size: calc(var(--symbol-size) * 1.5); }
        .credits-right p { margin-bottom: 5px; font-size: var(--symbol-size); }
        .credits-footer { margin-top: 20px; text-align: center; }

        /* --- View: Settings --- */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding-bottom: 20px;
        }
        .setting-group {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border: 1px solid #444;
        }
        .setting-group label {
            display: block;
            margin-bottom: 5px;
            color: #ddd;
            font-size: var(--symbol-size);
        }
        .setting-group select, .setting-group input[type="range"] {
            width: 100%;
            padding: 5px;
            background: #222;
            color: #fff;
            border: 1px solid #555;
            font-size: var(--symbol-size);
        }
        
        /* --- Drawing Canvas Modal --- */
        #drawing-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #drawing-toolbar {
            background: #333;
            padding: 10px;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        #drawing-canvas {
            background: #fff;
            border: 2px solid #555;
            cursor: crosshair;
        }

    </style>
</head>
<body>

    <!-- Filter Overlays -->
    <div id="warmth-overlay" class="filter-overlay"></div>
    <div id="coldness-overlay" class="filter-overlay"></div>
    <div id="nightlight-overlay"></div> <!-- Fixed above all -->

    <!-- Background System -->
    <div id="background-container">
        <!-- These are updated by JS. Using an array of images to manage states -->
        <img id="active-bg" class="bg-layer active" src="" onerror="this.src=''; this.style.backgroundColor='#5ab1ee';">
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="assets/sounds/music/main-menu//The_Stranglers_by_Jesusavgn_-_Golden_Brown_(mp3.pm).mp3" type="audio/mp3">
    </audio>

    <!-- 1. Boot Screen -->
    <div id="boot-overlay" onclick="initBootSequence()">
        Just click
    </div>

    <!-- 2. Splash Screen -->
    <div id="splash-screen">
        <img src="assets/main-menu/logo.png" alt="Luanti Logo" onerror="this.outerHTML='<h1 style=\'color:black; font-size:5rem;\'>MultiPixel</h1>'">
    </div>

    <!-- 3. Black Flash -->
    <div id="black-flash"></div>

    <!-- 4. Main Application -->
    <div id="app-wrapper">
        
        <!-- Header Image -->
        <div id="main-header">
            <img src="assets/main-menu/header.png" alt="Minetest Header" onerror="this.outerHTML='<h1 style=\'font-size: 4rem; letter-spacing: 5px; text-shadow: 3px 3px 0px #000;\'>MultiPixel FallBack</h1>'">
        </div>

        <div id="main-menu">
            <!-- Tabs -->
            <div id="tabs-bar">
                <button class="tab-btn active" onclick="switchTab('singleplayer')">Singleplayer</button>
                <button class="tab-btn" onclick="switchTab('multiplayer')">Multiplayer</button>
                <button class="tab-btn" onclick="switchTab('developers')">Developers</button>
                <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">Settings</button>
            </div>

            <!-- Content Area -->
            <div id="content-area">
                
                <!-- SINGLEPLAYER -->
                <div id="view-singleplayer" class="view active">
                    <div class="centered-view">
                        <!-- Instantly directs to singleplayer.html -->
                        <button id="btn-singleplayer" class="action-btn" onclick="window.location.href='singleplayer.html'">
                            New World
                        </button>
                    </div>
                </div>

                <!-- MULTIPLAYER -->
                <div id="view-multiplayer" class="view">
                    <div class="centered-view">
                        <img src="assets/main-menu/multiplayer.png" style="max-width: 100%; max-height: 100%; border:1px solid #555;" onerror="this.outerHTML='<h2>Multiplayer Placeholder Image</h2>'">
                    </div>
                </div>

                <!-- DEVELOPERS (Matching Image 2) -->
                <div id="view-developers" class="view">
                    <div class="credits-container">
                        <!-- Left Side Logo -->
                        <div class="credits-left">
                            <img src="assets/main-menu/logo.png" alt="Dev Logo" onerror="this.outerHTML='<div style=\'width:100px;height:100px;background:#555;display:flex;align-items:center;justify-content:center;\'>LOGO</div>'">
                        </div>
                        <!-- Right Side List -->
                        <div class="credits-right">
                            <h2>Core Developers</h2>
                            <p>Raptor4</p>
                            <h2>Ideas</h2>
                            <p>Arfon</p>
                            <p>Dulen</p>
                            <p>Cippaleta</p>
                            <h2>Credits to other stuff</h2>
                            <p>The stranglers</p>
                            <p>MineTest</p>
                            <p>Our beloved discord server</p>
                            <p>The artists: Termite, BoomKitty, Waterflame, autodidactic</p>
                            
                            <div class="credits-footer">
                                <button id="btn-github" class="action-btn" style="font-size: 1rem; padding: 10px 15px;" onclick="window.open('https://github.com/Relimintor/MultiPixel/', '_blank')">
                                    MultiPixel GitHub
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SETTINGS -->
                <div id="view-settings" class="view">
                    <div class="settings-grid">
                        
                        <!-- Layout & Sizing -->
                        <div class="setting-group">
                            <label>Tab Alignment</label>
                            <select onchange="updateCSS('--tab-alignment', this.value)">
                                <option value="flex-start">Left</option>
                                <option value="center">Center</option>
                                <option value="flex-end">Right</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>UI Scale</label>
                            <input type="range" min="0.6" max="1.5" step="0.1" value="1" oninput="updateCSS('--ui-scale', this.value)">
                        </div>
                        <div class="setting-group">
                            <label>Symbol / Font Size</label>
                            <input type="range" min="0.8" max="2" step="0.1" value="1" oninput="updateCSS('--symbol-size', this.value + 'rem')">
                        </div>
                        
                        <!-- Audio & Animation -->
                        <div class="setting-group">
                            <label>Soundtrack</label>
                            <select onchange="changeTrack(this.value)">
                                <option value="The_Stranglers_by_Jesusavgn_-_Golden_Brown_(mp3.pm).mp3">Golden Brown (Default)</option>
                                <option value="/Scott_D._Davis_-_The_Final_Countdown_(mp3.pm).mp3">Its the final countdown</option>
                                <option value="/1382827_Slash--Inferno.mp3">Slash Inferno</option>
                                <option value="song3.mp4">song3.mp4</option>
                                <option value="song4.mp4">No song at all :D</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>Menu Animation</label>
                            <select onchange="changeAnimation(this.value)">
                                <option value="">None</option>
                                <option value="anim-breathe">Breathe</option>
                                <option value="anim-pulse">Pulse</option>
                                <option value="anim-float">Float</option>
                            </select>
                        </div>

                        <!-- Theming (Buttons) -->
                        <div class="setting-group" style="grid-column: span 2;">
                            <label>Button Theming</label>
                            <div style="display:flex; gap:10px; align-items:center; margin-bottom: 5px;">
                                <input type="checkbox" id="chk-unified" checked onchange="toggleUnifiedColors()">
                                <span>Use Unified Button Color</span>
                            </div>
                            <!-- Unified Color Picker -->
                            <select id="sel-color-unified" onchange="updateButtonTheme()">
                                <option value="none">Default Grey</option>
                                <option value="main-menu/buttons/new-world/blue.png">Blue</option>
                                <option value="main-menu/buttons/new-world/red.png">Red</option>
                                <option value="main-menu/buttons/new-world/green.png">Green</option>
                            </select>

                            <!-- Separate Color Pickers (Hidden by default) -->
                            <div id="separate-colors" style="display: none; margin-top:10px; gap: 10px;">
                                <div>
                                    <label style="font-size:0.8rem">Singleplayer Btn</label>
                                    <select id="sel-color-sp" onchange="updateButtonTheme()">
                                        <option value="none">Default</option>
                                        <option value="assets/main-menu/buttons/new-world/blue.png">Blue</option>
                                        <option value="assets/main-menu/buttons/new-world/red.png">Red</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="font-size:0.8rem">Github Btn</label>
                                    <select id="sel-color-gh" onchange="updateButtonTheme()">
                                        <option value="none">Default</option>
                                        <option value="main-menu/buttons/new-world/blue.png">Blue</option>
                                        <option value="main-menu/buttons/new-world/green.png">Green</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Backgrounds -->
                        <div class="setting-group">
                            <label>Background</label>
                            <select onchange="changeBackgroundMode(this.value)">
                                <option value="rotating">Rotating (6 Default Images)</option>
                                <!-- Clear where to add more static backgrounds -->
                                <option value="assets/main-menu/background/dirt.png">Dirt</option>
                                <option value="assets/main-menu/background/stone.png">Stone</option>
                                <option value="assets/main-menu/background/grass.png">Grass</option>
                                <option value="custom">Custom Draw</option>
                            </select>
                            <button class="action-btn" style="width:100%; margin-top:10px; padding: 5px; font-size: 1rem;" onclick="openDrawingApp()">
                                Draw Background
                            </button>
                        </div>

                        <!-- Visual Filters -->
                        <div class="setting-group">
                            <label>Brightness</label>
                            <input type="range" min="0.2" max="2" step="0.1" value="1" oninput="updateCSS('--filter-brightness', this.value)">
                            <label>Warmth</label>
                            <input type="range" min="0" max="1" step="0.1" value="0" oninput="updateCSS('--filter-warmth', this.value)">
                            <label>Coldness</label>
                            <input type="range" min="0" max="1" step="0.1" value="0" oninput="updateCSS('--filter-coldness', this.value)">
                            <label>Nightlight</label>
                            <input type="range" min="0" max="0.8" step="0.1" value="0" oninput="updateCSS('--filter-nightlight', this.value)">
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Custom Drawing Canvas Modal -->
    <div id="drawing-modal">
        <div id="drawing-toolbar">
            <input type="color" id="draw-color" value="#000000">
            <input type="range" id="draw-size" min="1" max="50" value="5">
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="saveCanvas()" style="background:#4CAF50; color:white; border:none; padding:5px 10px;">Save & Apply</button>
            <button onclick="closeDrawingApp()">Cancel</button>
        </div>
        <canvas id="drawing-canvas" width="800" height="600"></canvas>
    </div>

    <!-- Main Logic Script -->
    <script>
        const root = document.documentElement;
        
        /* --- Boot Sequence --- */
        function initBootSequence() {
            // Hide boot text
            document.getElementById('boot-overlay').style.display = 'none';
            // Show splash (logo on white)
            document.getElementById('splash-screen').style.display = 'flex';

            // Wait a few seconds
            setTimeout(() => {
                // Flash black for a milisecond (using 100ms so it's visible to the human eye)
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('black-flash').style.display = 'block';

                setTimeout(() => {
                    document.getElementById('black-flash').style.display = 'none';
                    // Start Main Engine
                    startEngine();
                }, 100);
            }, 2500);
        }

        /* --- Engine Start --- */
        function startEngine() {
            document.getElementById('app-wrapper').style.display = 'flex';
            
            // Audio
            const audio = document.getElementById('bg-music');
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Audio play failed: ", e));

            // Backgrounds
            startBackgroundRotation();
        }

        /* --- Tabs --- */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
        }

        /* --- Settings System --- */
        function updateCSS(variable, value) {
            root.style.setProperty(variable, value);
        }

        // Animations
        function changeAnimation(animClass) {
            const menu = document.getElementById('main-menu');
            menu.className = ''; // reset
            if(animClass) menu.classList.add(animClass);
        }

        // Audio Track Switching
        function changeTrack(filename) {
            const audio = document.getElementById('bg-music');
            audio.src = 'assets/sounds/music/main-menu/' + filename;
            audio.play().catch(() => {});
        }

        // Button Colors
        function toggleUnifiedColors() {
            const isUnified = document.getElementById('chk-unified').checked;
            document.getElementById('sel-color-unified').style.display = isUnified ? 'block' : 'none';
            document.getElementById('separate-colors').style.display = isUnified ? 'none' : 'flex';
            updateButtonTheme();
        }

        function updateButtonTheme() {
            const isUnified = document.getElementById('chk-unified').checked;
            
            if (isUnified) {
                const val = document.getElementById('sel-color-unified').value;
                const url = val === 'none' ? 'none' : `url('${val}')`;
                updateCSS('--btn-bg-img-sp', url);
                updateCSS('--btn-bg-img-gh', url);
            } else {
                const spVal = document.getElementById('sel-color-sp').value;
                const ghVal = document.getElementById('sel-color-gh').value;
                updateCSS('--btn-bg-img-sp', spVal === 'none' ? 'none' : `url('${spVal}')`);
                updateCSS('--btn-bg-img-gh', ghVal === 'none' ? 'none' : `url('${ghVal}')`);
            }
        }

        /* --- Background Management --- */
        let bgInterval;
        const rotatingImages = [
            'assets/main-menu/background.png',
            'assets/main-menu/background1.png',
            'assets/main-menu/background2.png',
            'assets/main-menu/background3.png',
            'assets/main-menu/background4.png',
            'assets/main-menu/background5.png'
        ];
        let customBgDataUrl = null;

        function startBackgroundRotation() {
            clearInterval(bgInterval);
            let idx = 0;
            const imgEl = document.getElementById('active-bg');
            imgEl.src = rotatingImages[idx];
            
            bgInterval = setInterval(() => {
                idx = (idx + 1) % rotatingImages.length;
                imgEl.style.opacity = 0; // fade out
                setTimeout(() => {
                    imgEl.src = rotatingImages[idx];
                    imgEl.style.opacity = 1; // fade in
                }, 1000); // 1s transition
            }, 6000);
        }

        function changeBackgroundMode(mode) {
            const imgEl = document.getElementById('active-bg');
            if (mode === 'rotating') {
                startBackgroundRotation();
            } else if (mode === 'custom') {
                clearInterval(bgInterval);
                imgEl.style.opacity = 1;
                imgEl.src = customBgDataUrl || ''; // Use custom if exists
                if(!customBgDataUrl) alert("No custom drawing found. Please draw one!");
            } else {
                // Static image selected (e.g. dirt.png)
                clearInterval(bgInterval);
                imgEl.style.opacity = 1;
                imgEl.src = mode;
            }
        }

        /* --- Custom Drawing App --- */
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Init white bg
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });
        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.strokeStyle = document.getElementById('draw-color').value;
                ctx.lineWidth = document.getElementById('draw-size').value;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        });
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        function openDrawingApp() { document.getElementById('drawing-modal').style.display = 'flex'; }
        function closeDrawingApp() { document.getElementById('drawing-modal').style.display = 'none'; }
        function clearCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        function saveCanvas() {
            customBgDataUrl = canvas.toDataURL('image/png');
            closeDrawingApp();
            
            // Automatically switch to custom mode dropdown
            const bgSelect = document.querySelector('select[onchange="changeBackgroundMode(this.value)"]');
            bgSelect.value = 'custom';
            changeBackgroundMode('custom');
        }

    </script>
</body>
</html>
