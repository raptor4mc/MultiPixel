<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>MultiPixel boot</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #ccc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        button {
            padding: 18px 36px;
            font-size: 24px;
            cursor: pointer;
            background: #111;
            color: #ccc;
            border: 2px solid #444;
            border-radius: 10px;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 10px #222;
        }

        button:hover {
            transform: scale(1.15);
            box-shadow: 0 0 18px #666;
        }
    </style>

    <script>
        let clickSound;

        window.onload = () => {
            clickSound = new Audio("boot/audio/click_morph.mp3");
        };

        function go() {
            clickSound.currentTime = 0;
            clickSound.play();
            window.location.href = "boot/bootup.html";
        }
    </script>
</head>

<body>
    <button onclick="go()">I accept the license</button>
</body>
</html>
